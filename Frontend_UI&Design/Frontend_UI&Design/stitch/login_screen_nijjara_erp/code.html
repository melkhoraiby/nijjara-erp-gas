<!DOCTYPE html>

<html class="dark" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900&amp;family=Inter:wght@100;200;300;400;500;600;700;800;900&amp;family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-container": "#b6b8be",
              "outline": "#9a8f80",
              "on-tertiary-fixed": "#1a1c1c",
              "surface-dim": "#131314",
              "secondary-fixed-dim": "#c4c6cc",
              "secondary-fixed": "#e0e2e8",
              "primary-container": "#c5a059",
              "outline-variant": "#4e4639",
              "on-primary-container": "#4e3700",
              "on-tertiary-container": "#393b3b",
              "on-error-container": "#ffdad6",
              "on-surface": "#e5e2e3",
              "inverse-on-surface": "#313031",
              "surface-variant": "#353436",
              "on-background": "#e5e2e3",
              "secondary": "#c4c6cc",
              "surface-tint": "#e9c176",
              "tertiary-fixed": "#e2e2e2",
              "on-surface-variant": "#d1c5b4",
              "surface-bright": "#3a393a",
              "surface-container-low": "#1c1b1c",
              "surface": "#131314",
              "background": "#131314",
              "on-primary-fixed": "#261900",
              "surface-container": "#201f20",
              "primary-fixed-dim": "#e9c176",
              "on-error": "#690005",
              "on-primary": "#412d00",
              "on-secondary-fixed-variant": "#44474b",
              "error": "#ffb4ab",
              "surface-container-high": "#2a2a2b",
              "inverse-primary": "#775a19",
              "primary": "#e9c176",
              "primary-fixed": "#ffdea5",
              "on-secondary": "#2d3135",
              "surface-container-highest": "#353436",
              "surface-container-lowest": "#0e0e0f",
              "secondary-container": "#46494e",
              "error-container": "#93000a",
              "on-tertiary-fixed-variant": "#454747",
              "tertiary-container": "#a4a5a5",
              "inverse-surface": "#e5e2e3",
              "on-primary-fixed-variant": "#5d4201",
              "on-secondary-fixed": "#181c20",
              "tertiary": "#c6c6c7",
              "on-tertiary": "#2f3131",
              "tertiary-fixed-dim": "#c6c6c7"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"],
              "cairo": ["Cairo"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      body {
        background-color: #0e0e0f;
        font-family: 'Cairo', sans-serif;
      }
      .glass-card {
        background: rgba(32, 31, 32, 0.4);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
      }
      .metallic-gold-border {
        position: relative;
      }
      .metallic-gold-border::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(135deg, #e9c176 0%, #4e3700 50%, #c5a059 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
      }
      .bg-abstract {
        background-image: radial-gradient(circle at 80% 20%, rgba(233, 193, 118, 0.08) 0%, transparent 40%),
                          radial-gradient(circle at 20% 80%, rgba(196, 198, 204, 0.05) 0%, transparent 40%);
      }
      .internal-glow:focus-within {
        box-shadow: inset 0 0 12px rgba(233, 193, 118, 0.15);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        vertical-align: middle;
      }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-abstract overflow-hidden">
<!-- Background Layered Elements -->
<div class="fixed inset-0 -z-10 overflow-hidden">
<div class="absolute top-[-10%] right-[-5%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[40%] h-[40%] bg-secondary/5 blur-[120px] rounded-full"></div>
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-5 pointer-events-none"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-[480px] relative z-10">
<!-- Brand Header -->
<div class="text-center mb-12">
<div class="inline-flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">
                    shield_person
                </span>
</div>
<h1 class="text-4xl font-black text-primary tracking-[0.2em] mb-2 font-cairo">NIJJARA</h1>
<p class="text-on-surface-variant font-medium tracking-wide uppercase text-xs opacity-70">Sovereign Intelligence Systems</p>
</div>
<!-- Central Login Card -->
<div class="glass-card metallic-gold-border rounded-xl p-10 shadow-[0_40px_100px_rgba(0,0,0,0.6)] border border-outline-variant/10">
<div class="mb-8">
<h2 class="text-2xl font-bold text-on-surface mb-1 font-cairo">تسجيل الدخول</h2>
<p class="text-on-secondary-container text-sm font-light">أدخل بياناتك للوصول إلى لوحة التحكم المركزية</p>
</div>
<form action="#" class="space-y-6">
<!-- Username Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant mr-1">اسم المستخدم أو البريد الإلكتروني</label>
<div class="relative internal-glow group">
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="w-full bg-surface-container-lowest/50 border border-outline-variant/20 rounded-lg py-4 pr-12 pl-4 text-on-surface placeholder:text-outline-variant/50 focus:border-primary/40 focus:ring-0 transition-all duration-300 outline-none font-cairo" placeholder="user@nijjara.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center mr-1">
<label class="block text-sm font-medium text-on-surface-variant">كلمة المرور</label>
<a class="text-xs text-primary hover:text-primary-fixed-dim transition-colors" href="#">نسيت كلمة المرور؟</a>
</div>
<div class="relative internal-glow group">
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-surface-container-lowest/50 border border-outline-variant/20 rounded-lg py-4 pr-12 pl-4 text-on-surface placeholder:text-outline-variant/50 focus:border-primary/40 focus:ring-0 transition-all duration-300 outline-none font-cairo" placeholder="••••••••••••" type="password"/>
<button class="absolute inset-y-0 left-4 flex items-center text-outline-variant hover:text-secondary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center px-1">
<input class="w-4 h-4 rounded bg-surface-container border-outline-variant/30 text-primary focus:ring-primary/20" id="remember" type="checkbox"/>
<label class="mr-3 text-sm text-on-secondary-container select-none" for="remember">تذكر هذه الجلسة على هذا الجهاز</label>
</div>
<!-- Login Button -->
<button class="w-full relative group overflow-hidden bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-black py-4 rounded-lg shadow-[0_4px_20px_rgba(233,193,118,0.2)] hover:shadow-[0_4px_30px_rgba(233,193,118,0.4)] active:scale-[0.98] transition-all duration-300" type="submit">
<span class="relative z-10 flex items-center justify-center gap-2 font-cairo text-lg">
                        دخول النظام
                        <span class="material-symbols-outlined">arrow_back</span>
</span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
</button>
</form>
<!-- Bottom Actions -->
<div class="mt-10 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-on-secondary-container text-sm">
                    ليس لديك حساب؟
                    <a class="text-primary font-bold mr-1 hover:underline underline-offset-4 decoration-primary/30" href="#">إنشاء حساب جديد</a>
</p>
</div>
</div>
<!-- Footer Meta -->
<footer class="mt-8 flex justify-between items-center px-2">
<div class="flex items-center gap-6">
<div class="flex items-center gap-2 text-[10px] text-outline uppercase tracking-widest font-label">
<span class="w-1.5 h-1.5 rounded-full bg-primary/60"></span>
                    System Online
                </div>
<div class="text-[10px] text-outline uppercase tracking-widest font-label">
                    v2.4.0 High-Priority
                </div>
</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-outline text-[18px] cursor-pointer hover:text-primary transition-colors">public</span>
<span class="material-symbols-outlined text-outline text-[18px] cursor-pointer hover:text-primary transition-colors">help_outline</span>
</div>
</footer>
</main>
<!-- Side Decoration (Editorial Aspect) -->
<div class="hidden lg:block fixed left-12 top-1/2 -translate-y-1/2 rotate-90 origin-left">
<span class="text-[80px] font-black text-on-surface opacity-[0.03] select-none tracking-[0.4em] font-headline">INTELLIGENCE</span>
</div>
</body></html>
