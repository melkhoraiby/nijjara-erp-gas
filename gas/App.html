            '<section class="workspace-taskbar' + (state.taskbarVisible ? ' workspace-taskbar--visible' : '') + '" id="taskbar"><div class="workspace-taskbar__inner"><div class="workspace-taskbar__controls"><button class="workspace-icon-button" type="button" title="تصغير الكل" data-taskbar-action="minimize-all">—</button><button class="workspace-icon-button" type="button" title="إظهار الكل" data-taskbar-action="restore-all">□</button><button class="workspace-icon-button" type="button" title="إغلاق الكل" data-taskbar-action="close-all">×</button></div><div class="workspace-taskbar__windows">' + state.windows.map(function (entry) { return '<button class="workspace-taskbar__window' + (state.focusedWindowId === entry.id && !entry.minimized ? ' workspace-taskbar__window--active' : '') + '" type="button" data-toggle-window="' + e(entry.id) + '">' + e(entry.label) + '</button>'; }).join('') + '</div></div></section>' +
            renderModal() +
            renderExecutiveReportModal() +
            renderConfirm() +
            renderLoader() +
          '</main>' +
        '</div>' + renderToasts();

      bindAppEvents();
    }

    function bindAppEvents() {
      var menuHandle = root.querySelector('#menuHandle');
      if (menuHandle) menuHandle.addEventListener('click', function () {
        state.drawerOpen = !state.drawerOpen;
        if (state.drawerOpen) {
          state.drawerGroupKey = '';
        }
        render();
      });
      var drawerBackdrop = root.querySelector('#drawerBackdrop');
      if (drawerBackdrop) drawerBackdrop.addEventListener('click', function () { state.drawerOpen = false; state.notificationsOpen = false; render(); });

      Array.prototype.forEach.call(root.querySelectorAll('[data-drawer-group]'), function (button) {
        button.addEventListener('click', function () {
          var groupKey = button.getAttribute('data-drawer-group');
          if (isHardDeniedGroupKey(groupKey)) {
            denyAccessInstantly();
            return;
          }
          var group = (state.bootstrap && state.bootstrap.navigation || []).find(function (entry) {
            return entry.key === groupKey;
          });
          if (group && !groupHasAccessibleModule(group.items)) {
            denyAccessInstantly();
            return;
          }
          state.drawerGroupKey = state.drawerGroupKey === groupKey ? '' : groupKey;
          render();
        });
      });

      var notificationsButton = root.querySelector('#notificationsButton');
      if (notificationsButton) notificationsButton.addEventListener('click', function () {
        (async function () {
          if (!state.notificationsOpen && !state.notificationsLoaded) {
            warmNotifications(false);
            state.drawerOpen = false;
          }
          state.notificationsOpen = !state.notificationsOpen;
          render();
        })();
      });

      Array.prototype.forEach.call(root.querySelectorAll('[data-toast-dismiss]'), function (button) {
        button.addEventListener('click', function () {
          dismissToast(button.getAttribute('data-toast-dismiss'));
        });
      });

      Array.prototype.forEach.call(root.querySelectorAll('[data-clear-all-notifications]'), function (button) {
        button.addEventListener('click', async function () {
          try {
            await withLoading('جارٍ مسح الإشعارات...', function () {
              return callServer('nijjaraClearAllNotifications', state.session.token);
            });
            state.bootstrap.notifications = [];
            state.notificationsLoaded = true;
            render();
            toast('success', 'تم مسح جميع الإشعارات.');
          } catch (error) {
            toast('error', error.message);
          }
        });
      });

      var openExecutiveReportButton = root.querySelector('#openExecutiveReportButton');
      if (openExecutiveReportButton) openExecutiveReportButton.addEventListener('click', function () {
        openExecutiveReportModal().catch(function (error) {
          toast('error', error.message);
        });
      });
      var closeExecutiveReportButton = root.querySelector('#closeExecutiveReportButton');
      if (closeExecutiveReportButton) closeExecutiveReportButton.addEventListener('click', closeExecutiveReportModal);
      var closeExecutiveReportFooterButton = root.querySelector('#closeExecutiveReportFooterButton');
      if (closeExecutiveReportFooterButton) closeExecutiveReportFooterButton.addEventListener('click', closeExecutiveReportModal);
      var downloadExecutiveReportButton = root.querySelector('#downloadExecutiveReportButton');
      if (downloadExecutiveReportButton) downloadExecutiveReportButton.addEventListener('click', downloadExecutiveReportHtml);
      var shareExecutiveReportWhatsappButton = root.querySelector('#shareExecutiveReportWhatsappButton');
      if (shareExecutiveReportWhatsappButton) shareExecutiveReportWhatsappButton.addEventListener('click', shareExecutiveReportToWhatsapp);
      var sendExecutiveReportButton = root.querySelector('#sendExecutiveReportButton');
      if (sendExecutiveReportButton) sendExecutiveReportButton.addEventListener('click', function () {
        emailExecutiveReport().catch(function (error) {
          toast('error', error.message);
        });
      });

      Array.prototype.forEach.call(root.querySelectorAll('[data-nav-key]'), function (button) {
        button.addEventListener('click', function () {
          var targetKey = button.getAttribute('data-nav-key');
          if (isHardDeniedModuleKey(targetKey)) {
            denyAccessInstantly();
            return;
          }
          var target = null;
          state.bootstrap.navigation.some(function (group) {
            target = findNavigationItem(targetKey, group.items);
            return !!target;
          });
          if (!target) return;
          if (!state.bootstrap.moduleActions[target.key] || !state.bootstrap.moduleActions[target.key].view) {
            denyAccessInstantly();
            return;
          }
          state.drawerOpen = false;
          state.notificationsOpen = false;
          openWindow(target);
        });
      });

      Array.prototype.forEach.call(root.querySelectorAll('[data-sort-column]'), function (header) {
        header.addEventListener('click', async function () {
          var moduleKey = header.getAttribute('data-sort-column');
          var columnKey = header.getAttribute('data-column-key');
          var dataset = getDatasetForModule(moduleKey);
          var gridState = getGridState(moduleKey, dataset);
          if (!gridState) return;
          if (gridState.sortKey === columnKey) {
            gridState.sortDir = gridState.sortDir === 'asc' ? 'desc' : 'asc';
          } else {
            gridState.sortKey = columnKey;
            gridState.sortDir = 'asc';
          }
          gridState.page = 1;
          if (isServerGridModule(moduleKey)) {
            await refreshGridData(moduleKey);
          } else {
            render();
          }
        });
      });

      Array.prototype.forEach.call(root.querySelectorAll('[data-filter-input]'), function (input) {
        input.addEventListener('input', async function () {
          rememberFocus(input);
          var moduleKey = input.getAttribute('data-filter-input');
          var columnKey = input.getAttribute('data-column-key');
          var dataset = getDatasetForModule(moduleKey);
          var gridState = getGridState(moduleKey, dataset);
          if (!gridState) return;
          gridState.filters[columnKey] = input.value;
          gridState.page = 1;
          if (isServerGridModule(moduleKey)) {
            await refreshGridData(moduleKey, { debounceMs: 180 });
          } else {
            render();
          }
        });
      });

      Array.prototype.forEach.call(root.querySelectorAll('[data-date-trigger]'), function (button) {
        button.addEventListener('click', function (event) {
          event.preventDefault();
          event.stopPropagation();
          var wrapper = button.closest('[data-date-filter]');
          if (!wrapper) return;
          var willOpen = !wrapper.classList.contains('date-filter--open');
          Array.prototype.forEach.call(root.querySelectorAll('[data-date-filter]'), function (item) {
            item.classList.remove('date-filter--open');
          });
          if (willOpen) wrapper.classList.add('date-filter--open');
        });
      });

      Array.prototype.forEach.call(root.querySelectorAll('[data-date-mode]'), function (select) {
        select.addEventListener('change', async function () {
          var moduleKey = select.getAttribute('data-date-mode');
          var columnKey = select.getAttribute('data-column-key');
          var dataset = getDatasetForModule(moduleKey);
          var gridState = getGridState(moduleKey, dataset);
          if (!gridState) return;
          var wrapper = select.closest('[data-date-filter]');
          gridState.dateFilters[columnKey] = gridState.dateFilters[columnKey] || { mode: 'exact', exact: '', from: '', to: '' };
          gridState.dateFilters[columnKey].mode = select.value;
          updateDateFilterPopoverVisibility(wrapper, select.value);
          gridState.page = 1;
          if (isServerGridModule(moduleKey)) {
            await refreshGridData(moduleKey, { debounceMs: 180 });
          } else {
            render();
          }
        });
      });

      Array.prototype.forEach.call(root.querySelectorAll('.date-filter__popover'), function (popover) {
        popover.addEventListener('click', function (event) {
          event.stopPropagation();
        });
      });

      if (!state._dateFilterCloserBound) {
        document.addEventListener('click', function (event) {
          if (event.target.closest && event.target.closest('[data-date-filter]')) return;
          Array.prototype.forEach.call(root.querySelectorAll('[data-date-filter]'), function (item) {
            item.classList.remove('date-filter--open');
          });
        });
        state._dateFilterCloserBound = true;
      }

      Array.prototype.forEach.call(root.querySelectorAll('[data-date-exact],[data-date-from],[data-date-to]'), function (input) {
        input.addEventListener('change', async function () {
          rememberFocus(input);
          var moduleKey = input.getAttribute('data-date-exact') || input.getAttribute('data-date-from') || input.getAttribute('data-date-to');
          var columnKey = input.getAttribute('data-column-key');
          var dataset = getDatasetForModule(moduleKey);
          var gridState = getGridState(moduleKey, dataset);
          if (!gridState) return;
          gridState.dateFilters[columnKey] = gridState.dateFilters[columnKey] || { mode: 'exact', exact: '', from: '', to: '' };
          if (input.hasAttribute('data-date-exact')) gridState.dateFilters[columnKey].exact = input.value;
          if (input.hasAttribute('data-date-from')) gridState.dateFilters[columnKey].from = input.value;
          if (input.hasAttribute('data-date-to')) gridState.dateFilters[columnKey].to = input.value;
          gridState.page = 1;
          if (isServerGridModule(moduleKey)) {
            await refreshGridData(moduleKey, { debounceMs: 180 });
          } else {
            render();
          }
        });
      });

      Array.prototype.forEach.call(root.querySelectorAll('[data-grid-page]'), function (button) {
        button.addEventListener('click', async function () {
          var moduleKey = button.getAttribute('data-grid-page');
          var dataset = getDatasetForModule(moduleKey);
          var gridState = getGridState(moduleKey, dataset);
          if (!gridState) return;
          gridState.page += button.getAttribute('data-page-direction') === 'next' ? 1 : -1;
          if (gridState.page < 1) gridState.page = 1;
          if (isServerGridModule(moduleKey)) {
            await refreshGridData(moduleKey);
          } else {
            render();
          }
        });
      });

      Array.prototype.forEach.call(root.querySelectorAll('[data-reset-filters]'), function (button) {
        button.addEventListener('click', async function () {
          var moduleKey = button.getAttribute('data-reset-filters');
          var dataset = getDatasetForModule(moduleKey);
          var gridState = getGridState(moduleKey, dataset);
          if (!gridState) return;
          gridState.filters = {};
          gridState.dateFilters = {};
          gridState.page = 1;
          if (isServerGridModule(moduleKey)) {
            await refreshGridData(moduleKey);
          } else {
            render();
          }
        });
      });

      Array.prototype.forEach.call(root.querySelectorAll('[data-view-record],[data-edit-record],[data-delete-record]'), function (button) {
        button.addEventListener('click', async function () {
          var rowId = button.getAttribute('data-view-record') || button.getAttribute('data-edit-record') || button.getAttribute('data-delete-record');
          var moduleWindow = button.closest('.workspace-window');
          var moduleKey = button.getAttribute('data-action-module') || (moduleWindow ? moduleWindow.getAttribute('data-window-key') : '');
          var dataset = getDatasetForModule(moduleKey);
          if (!dataset) return;
          var row = dataset.rows.find(function (item) { return String(item.id) === String(rowId); });
          if (!row) return;

          if (String(moduleKey).indexOf('custody:') === 0) {
            if (button.hasAttribute('data-view-record')) {
              openCustodyRecordModal(moduleKey, row, 'view');
              return;
            }
            if (button.hasAttribute('data-edit-record')) {
              openCustodyRecordModal(moduleKey, row, 'edit');
              return;
            }
            if (button.hasAttribute('data-delete-record')) {
              var custodyDeleteResult = await withLoading('جارٍ حذف السجل...', function () {
                if (moduleKey === 'custody:accounts') {
                  return callServer('nijjaraDeleteCustodyAccount', state.session.token, row.id);
                }
                if (moduleKey === 'custody:transfers') {
                  return callServer('nijjaraDeleteCustodyTransfer', state.session.token, row.id);
                }
                return Promise.resolve();
              });
              state.datasets.custody = null;
              applyCustodyData(custodyDeleteResult);
              loadBootstrap({ preserveWindows: true, preserveDatasets: true }).catch(function () {});
              toast('success', 'تم تحديث السجل بنجاح.');
              return;
            }
          }

          if (button.hasAttribute('data-view-record')) {
            await openRecordViewForModule(moduleKey, row, dataset);
            return;
          }

          if (button.hasAttribute('data-edit-record')) {
            await openEditModalForRecord(moduleKey, row.id, row.formValues || row.values || {});
            return;
          }

          state.confirmCancel = false;
          await withLoading('جارٍ حذف السجل...', function () {
            return callServer('nijjaraDeleteModuleRecord', state.session.token, moduleKey, row.id);
          });
          removeDatasetRow(moduleKey, row.id);
          if (state.datasets[moduleKey]) {
            resetModuleGridAfterSave(moduleKey, state.datasets[moduleKey]);
          }
          loadBootstrap({ preserveWindows: true, preserveDatasets: true }).catch(function () {});
          toast('success', 'تم حذف السجل بنجاح.');
        });
      });

      Array.prototype.forEach.call(root.querySelectorAll('[data-focus-window]'), function (element) {
        element.addEventListener('mousedown', function (event) {
          if (event.target.closest('[data-no-focus="1"]')) return;
          focusWindow(element.getAttribute('data-focus-window'));
        });
      });
      Array.prototype.forEach.call(root.querySelectorAll('[data-drag-window]'), function (element) {
        element.addEventListener('mousedown', function (event) {
          if (event.target.closest('[data-no-drag="1"]')) return;
          startWindowDrag(element.getAttribute('data-drag-window'), event);
        });
      });
      Array.prototype.forEach.call(root.querySelectorAll('[data-no-drag="1"],[data-no-focus="1"]'), function (button) {
        button.addEventListener('mousedown', function (event) {
          event.stopPropagation();
        });
        button.addEventListener('click', function (event) {
          event.stopPropagation();
        });
      });
      Array.prototype.forEach.call(root.querySelectorAll('[data-close-window]'), function (button) {
        button.addEventListener('click', function () { closeWindow(button.getAttribute('data-close-window')); });
      });
      Array.prototype.forEach.call(root.querySelectorAll('[data-max-window]'), function (button) {
        button.addEventListener('click', function () { maximizeWindow(button.getAttribute('data-max-window')); });
      });
      Array.prototype.forEach.call(root.querySelectorAll('[data-toggle-window]'), function (button) {
        button.addEventListener('click', function () { toggleWindow(button.getAttribute('data-toggle-window')); });
      });
      Array.prototype.forEach.call(root.querySelectorAll('[data-taskbar-action]'), function (button) {
        button.addEventListener('click', function () {
          var action = button.getAttribute('data-taskbar-action');
          if (action === 'minimize-all') minimizeAllWindows();
          if (action === 'restore-all') restoreAllWindows();
          if (action === 'close-all') closeAllWindows();
        });
      });
      Array.prototype.forEach.call(root.querySelectorAll('[data-resize-window]'), function (button) {
        button.addEventListener('mousedown', function (event) {
          event.preventDefault();
          startWindowResize(button.getAttribute('data-resize-window'), event);
        });
      });
      Array.prototype.forEach.call(root.querySelectorAll('[data-open-form]'), function (button) {
        button.addEventListener('click', async function () {
          await handleOpenFormRequest(button.getAttribute('data-open-form'));
        });
      });

      Array.prototype.forEach.call(root.querySelectorAll('[data-custody-tab]'), function (button) {
        button.addEventListener('click', function () {
          state.custodyTab = button.getAttribute('data-custody-tab');
          render();
        });
      });

      var taskbarTrigger = root.querySelector('#taskbarTrigger');
      if (taskbarTrigger) {
        var showTaskbar = function () {
          if (state.taskbarVisible) return;
          state.taskbarVisible = true;
          render();
        };
        taskbarTrigger.addEventListener('mouseenter', showTaskbar);
        taskbarTrigger.addEventListener('mousemove', showTaskbar);
        taskbarTrigger.addEventListener('click', showTaskbar);
      }
      var taskbar = root.querySelector('#taskbar');
      if (taskbar) {
        taskbar.addEventListener('mouseenter', function () { state.taskbarVisible = true; });
        taskbar.addEventListener('mouseleave', function () { state.taskbarVisible = false; render(); });
      }

      var logoutButton = root.querySelector('#logoutButton');
      if (logoutButton) logoutButton.addEventListener('click', async function () {
        try { await withLoading('جارٍ تسجيل الخروج...', function () { return callServer('nijjaraLogout', state.session.token); }); } catch (error) {}
        saveToken('');
        state.session = null;
        state.bootstrap = null;
        state.windows = [];
        state.modalForm = null;
        render();
      });

      Array.prototype.forEach.call(root.querySelectorAll('[data-notification-open]'), function (card) {
        var openFromCard = async function () {
          try {
            await openNotificationTarget(
              card.getAttribute('data-notification-open'),
              'OPEN',
              card.getAttribute('data-notification-source-record'),
              card.getAttribute('data-notification-module'),
              card.getAttribute('data-notification-target')
            );
            toast('success', 'تم فتح الإشعار بنجاح.');
          } catch (error) {
            toast('error', error.message);
          }
        };
        card.addEventListener('click', function (event) {
          if (event.target.closest && event.target.closest('[data-notification-id][data-notification-action]')) return;
          openFromCard();
        });
        card.addEventListener('keydown', function (event) {
          if (event.key !== 'Enter' && event.key !== ' ') return;
          event.preventDefault();
          openFromCard();
        });
      });

      Array.prototype.forEach.call(root.querySelectorAll('[data-notification-id][data-notification-action]'), function (button) {
        button.addEventListener('click', async function () {
          try {
            await openNotificationTarget(
              button.getAttribute('data-notification-id'),
              button.getAttribute('data-notification-action'),
              button.getAttribute('data-notification-source-record'),
              button.getAttribute('data-notification-module'),
              button.getAttribute('data-notification-target')
            );
            toast('success', 'The notification action was completed.');
          } catch (error) {
            toast('error', error.message);
          }
        });
      });

      Array.prototype.forEach.call(root.querySelectorAll('[data-transfer-id][data-transfer-action]'), function (button) {
        button.addEventListener('click', async function () {
          try {
            await withLoading('جارٍ تحديث تحويل العهدة...', function () {
              return callServer(
                'nijjaraActOnCustodyTransfer',
                state.session.token,
                button.getAttribute('data-transfer-id'),
                button.getAttribute('data-transfer-action'),
                ''
              );
            });
            await loadBootstrap({ preserveWindows: true });
            toast('success', 'The custody transfer was updated.');
          } catch (error) {
            toast('error', error.message);
          }
        });
      });

      bindFormEvents();
    }

    function bindFormEvents() {
      var closeModal = root.querySelector('#closeModalButton');
      var cancelForm = root.querySelector('#cancelFormButton');
      if (closeModal) closeModal.addEventListener('click', requestCancelForm);
      if (cancelForm) cancelForm.addEventListener('click', requestCancelForm);

      var continueEditing = root.querySelector('#continueEditingButton');
      var confirmCancel = root.querySelector('#confirmCancelButton');
      if (continueEditing) continueEditing.addEventListener('click', function () { state.confirmCancel = false; render(); });
      if (confirmCancel) confirmCancel.addEventListener('click', function () { state.confirmCancel = false; state.modalForm = null; render(); });

      var pick = root.querySelector('#pickAttachmentsButton');
      var input = root.querySelector('#attachmentInput');
      if (pick && input) {
        pick.addEventListener('click', function () { input.click(); });
        input.addEventListener('change', async function () {
          try {
            state.modalForm.pendingAttachments = await withLoading('جارٍ تجهيز المرفقات...', function () {
              return normalizeSelectedAttachments(input.files || []);
            });
            render();
          } catch (error) {
            toast('error', error.message);
          }
        });
      }

      var next = root.querySelector('#nextFormButton');
      if (next) next.addEventListener('click', function () {
        var form = root.querySelector('#modalFormElement');
        if (!form || !form.reportValidity()) return;
        var payload = buildModalSavePayload(form);
        state.modalForm.values = Object.assign({}, payload);
        state.modalForm.summary = deriveSummaryValues(payload);
        render();
      });

      var back = root.querySelector('#backFormButton');
      if (back) back.addEventListener('click', function () { state.modalForm.summary = null; render(); });
      var save = root.querySelector('#saveFormButton');
      if (save) save.addEventListener('click', async function () {
        try {
          var form = root.querySelector('#modalFormElement');
          await saveModalForm(buildModalSavePayload(form));
        } catch (error) {
          toast('error', error.message);
        }
      });

      Array.prototype.forEach.call(root.querySelectorAll('[data-rp-select-category]'), function (btn) {
        btn.addEventListener('click', function () {
          if (!state.modalForm) return;
          var selected = btn.getAttribute('data-rp-select-category');
          state.modalForm.values = Object.assign({}, state.modalForm.values || {}, {
            paymentCategory: selected,
            internalSubType: '',
            projectId: '',
            showroomOrderId: '',
            factoryOrderName: '',
            totalOrderCost: ''
          });
          render();
        });
      });
      Array.prototype.forEach.call(root.querySelectorAll('[data-rp-select-subchannel]'), function (btn) {
        btn.addEventListener('click', function () {
          if (!state.modalForm) return;
          var selected = btn.getAttribute('data-rp-select-subchannel');
          state.modalForm.values = Object.assign({}, state.modalForm.values || {}, {
            internalSubType: selected,
            showroomOrderId: '',
            factoryOrderName: '',
            totalOrderCost: ''
          });
          render();
        });
      });

      var modalFormElement = root.querySelector('#modalFormElement');
      if (modalFormElement) {
        Array.prototype.forEach.call(modalFormElement.querySelectorAll('input,select,textarea'), function (element) {
          var handler = function () { refreshDerivedFields(); };
          element.addEventListener('input', handler);
          element.addEventListener('change', handler);
          if (element.name && /mobile|phone|tel/i.test(element.name)) {
            element.addEventListener('blur', function () {
              element.value = formatMobileValue(element.value).replace('—', '');
            });
          }
        });
      }

      Array.prototype.forEach.call(root.querySelectorAll('[data-smart-search]'), function (container) {
        var source = ((state.bootstrap && state.bootstrap.lookups && state.bootstrap.lookups[container.getAttribute('data-smart-search')]) || []);
        var inputField = container.parentElement.querySelector('input');
        if (!inputField) return;
        inputField.addEventListener('input', function () {
          var query = String(inputField.value || '').trim().toLowerCase();
          if (!query) {
            container.innerHTML = '';
            return;
          }
          var matches = source.filter(function (item) {
            return String(item.label || '').toLowerCase().indexOf(query) !== -1 || String(item.sublabel || '').toLowerCase().indexOf(query) !== -1;
          }).slice(0, 8);
          container.innerHTML = matches.map(function (item) {
            return '<button class="smart-search-option" type="button" data-smart-value="' + e(item.label) + '" data-smart-category="' + e(item.category || '') + '" data-smart-sub="' + e(item.subCategory || '') + '" data-smart-type="' + e(item.factoryExpenseType || item.directExpenseType || '') + '"><strong>' + e(item.label) + '</strong>' + (item.sublabel ? '<div class="dashboard-card__detail">' + e(item.sublabel) + '</div>' : '') + '</button>';
          }).join('');
          Array.prototype.forEach.call(container.querySelectorAll('[data-smart-value]'), function (button) {
            button.addEventListener('click', function () {
              inputField.value = button.getAttribute('data-smart-value');
              var category = root.querySelector('[data-derived-field="categoryInfo"]');
              var sub = root.querySelector('[data-derived-field="subCategoryInfo"]');
              var type = root.querySelector('[data-derived-field="expenseTypeInfo"]');
              if (category) category.value = button.getAttribute('data-smart-category') || '—';
              if (sub) sub.value = button.getAttribute('data-smart-sub') || '—';
              if (type) type.value = button.getAttribute('data-smart-type') || '—';
              container.innerHTML = '';
              refreshDerivedFields();
            });
          });
        });
      });

      refreshDerivedFields();
    }

    function requestCancelForm() {
      if (state.modalForm && state.modalForm.mode === 'view') {
        state.modalForm = null;
        render();
        return;
      }
      var form = root.querySelector('#modalFormElement');
      if (!form) { state.modalForm = null; render(); return; }
      var hasData = Array.prototype.some.call(form.querySelectorAll('input,select,textarea'), function (element) {
        if (element.type === 'file') return false;
        return String(element.value || '').trim() !== '';
      }) || ((state.modalForm.pendingAttachments || []).length > 0);
      if (!hasData) { state.modalForm = null; render(); return; }
      state.confirmCancel = true;
      render();
    }

    function render() {
      if (state.booting && !state.session && !state.bootstrap) {
        root.innerHTML = '<div class="auth-shell"><main class="auth-card"><div class="brand-mark">NIJJARA</div><p class="hero-subtitle">Sovereign Intelligence Systems</p><div class="module-loading-state module-loading-state--info"><strong>جاري تهيئة النظام</strong><p>يتم التحقق من الجلسة وتجهيز مساحة العمل.</p></div></main></div>' + renderLoader() + renderToasts();
        restoreRememberedFocus();
        return;
      }
      if (!state.session || !state.bootstrap) {
        renderAuth();
        restoreRememberedFocus();
        return;
      }
      renderApp();
      restoreRememberedFocus();
    }

    async function boot() {
      var initialParams = Object.assign({}, window.NIJJARA_INITIAL_PARAMS || {}, await getUrlLocationParams());
      if (initialParams && initialParams.token && String(initialParams.flow || '') === 'password-setup') {
        try {
          state.authFlowToken = String(initialParams.token || '');
          state.authFlowContext = await callServer('nijjaraGetPasswordSetupContext', state.authFlowToken);
          state.authMode = 'setup';
          state.booting = false;
          render();
          return;
        } catch (error) {
          state.booting = false;
          toast('error', error.message);
          render();
          return;
        }
      }
      state.booting = false;
      state.loading = null;
      render();
    }

    bindGlobalEvents();
    boot();
  })();
</script>
