<div id="appRoot"></div>

<script>
  (function () {
    var state = {
      booting: true,
      authMode: 'login',
      authDraft: {},
      authFlowToken: '',
      authFlowContext: null,
      session: null,
      bootstrap: null,
      datasets: {},
      gridStates: {},
      gridBusy: {},
      gridRefreshSeq: {},
      gridRefreshTimers: {},
      largeModuleCaches: {},
      windows: [],
      focusedWindowId: '',
      drawerOpen: false,
      drawerGroupKey: '',
      notificationsOpen: false,
      notificationsLoaded: false,
      notificationsLoading: false,
      custodyTab: 'accounts',
      taskbarVisible: false,
      modalForm: null,
      executiveReport: null,
      confirmCancel: false,
      loading: null,
      toasts: [],
      focusRestore: null
    };

    var root = document.getElementById('appRoot');
    var globalEventsBound = false;

    function e(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function windowIcon(kind) {
      if (kind === 'close') {
        return '<svg viewBox="0 0 24 24" aria-hidden="true" class="traffic-button__icon"><path d="M6 6l12 12"></path><path d="M18 6 6 18"></path></svg>';
      }
      if (kind === 'minimize') {
        return '<svg viewBox="0 0 24 24" aria-hidden="true" class="traffic-button__icon"><path d="M6 12h12"></path></svg>';
      }
      return '<svg viewBox="0 0 24 24" aria-hidden="true" class="traffic-button__icon"><rect x="5" y="5" width="14" height="14" rx="1.5"></rect></svg>';
    }

    function uiIcon(kind) {
      var icons = {
        add: '<svg viewBox="0 0 24 24" aria-hidden="true" class="ui-button__icon"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>',
        next: '<svg viewBox="0 0 24 24" aria-hidden="true" class="ui-button__icon"><path d="M5 12h12"></path><path d="M13 6l6 6-6 6"></path></svg>',
        back: '<svg viewBox="0 0 24 24" aria-hidden="true" class="ui-button__icon"><path d="M19 12H7"></path><path d="M11 18 5 12l6-6"></path></svg>',
        save: '<svg viewBox="0 0 24 24" aria-hidden="true" class="ui-button__icon"><path d="M5 20h14"></path><path d="M12 4v12"></path><path d="m17 11-5 5-5-5"></path></svg>',
        cancel: '<svg viewBox="0 0 24 24" aria-hidden="true" class="ui-button__icon"><path d="M6 6l12 12"></path><path d="M18 6 6 18"></path></svg>',
        view: '<svg viewBox="0 0 24 24" aria-hidden="true" class="ui-button__icon"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"></path><circle cx="12" cy="12" r="3"></circle></svg>',
        edit: '<svg viewBox="0 0 24 24" aria-hidden="true" class="ui-button__icon"><path d="M4 20h4l10-10-4-4L4 16v4Z"></path><path d="m13 7 4 4"></path></svg>',
        delete: '<svg viewBox="0 0 24 24" aria-hidden="true" class="ui-button__icon"><path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M6 7l1 12h10l1-12"></path><path d="M9 7V5h6v2"></path></svg>',
        adjust: '<svg viewBox="0 0 24 24" aria-hidden="true" class="ui-button__icon"><path d="M4 7h10"></path><path d="M18 7h2"></path><path d="M14 7a2 2 0 1 0 4 0 2 2 0 0 0-4 0Z"></path><path d="M4 17h2"></path><path d="M10 17h10"></path><path d="M6 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0Z"></path></svg>',
        transfer: '<svg viewBox="0 0 24 24" aria-hidden="true" class="ui-button__icon"><path d="M7 7h11"></path><path d="m14 4 4 3-4 3"></path><path d="M17 17H6"></path><path d="m10 14-4 3 4 3"></path></svg>'
      };
      return icons[kind] || icons.view;
    }

    function renderIconButton(options) {
      options = options || {};
      var classes = ['action-button'];
      if (options.tone) classes.push('action-button--' + options.tone);
      if (options.iconOnly) classes.push('action-button--icon-only');
      if (options.compact) classes.push('action-button--compact');
      var attrs = [];
      Object.keys(options.attrs || {}).forEach(function (key) {
        attrs.push(key + '="' + e(options.attrs[key]) + '"');
      });
      if (options.attrs && options.attrs['data-open-form']) {
        attrs.push('onclick="window.nijjaraOpenForm && window.nijjaraOpenForm(\'' + e(options.attrs['data-open-form']) + '\')"');
      }
      if (options.title) {
        attrs.push('title="' + e(options.title) + '"');
        attrs.push('aria-label="' + e(options.title) + '"');
      }
      return '<button class="' + classes.join(' ') + '" type="' + e(options.type || 'button') + '" ' + attrs.join(' ') + '>' +
        uiIcon(options.icon || 'view') +
        (options.iconOnly ? '' : '<span class="action-button__label">' + e(options.label || '') + '</span>') +
      '</button>';
    }

    function callServer(method) {
      var args = Array.prototype.slice.call(arguments, 1);
      return new Promise(function (resolve, reject) {
        google.script.run.withSuccessHandler(function (response) {
          if (typeof response === 'string') {
            var trimmed = response.trim();
            if (trimmed && (trimmed.charAt(0) === '{' || trimmed.charAt(0) === '[')) {
              try {
                resolve(JSON.parse(trimmed));
                return;
              } catch (parseError) {}
            }
          }
          resolve(response);
        }).withFailureHandler(function (error) {
          reject(new Error(error && error.message ? error.message : String(error)));
        })[method].apply(google.script.run, args);
      });
    }

    function getUrlLocationParams() {
      return new Promise(function (resolve) {
        try {
          if (google && google.script && google.script.url && typeof google.script.url.getLocation === 'function') {
            google.script.url.getLocation(function (location) {
              var parameters = (location && location.parameter) || {};
              var hash = (location && location.hash) || '';
              if (hash && hash.indexOf('=') !== -1) {
                hash.replace(/^#/, '').split('&').forEach(function (part) {
                  var pieces = part.split('=');
                  if (!pieces[0]) return;
                  parameters[decodeURIComponent(pieces[0])] = decodeURIComponent((pieces[1] || '').replace(/\+/g, ' '));
                });
              }
              resolve(parameters);
            });
            return;
          }
        } catch (error) {}
        resolve({});
      });
    }

    function delay(ms) {
      return new Promise(function (resolve) {
        setTimeout(resolve, ms);
      });
    }

    function isServerGridModule(moduleKey) {
      return false;
    }

    function supportsLargeModuleCache(moduleKey) {
      return ['expenses', 'projectDirectExpenses'].indexOf(String(moduleKey || '')) !== -1;
    }

    function readFileAsBase64(file) {
      return new Promise(function (resolve, reject) {
        var reader = new FileReader();
        reader.onload = function () {
          var result = String(reader.result || '');
          resolve(result.split(',').pop() || '');
        };
        reader.onerror = function () {
          reject(new Error('تعذر قراءة المرفق.'));
        };
        reader.readAsDataURL(file);
      });
    }

    async function normalizeSelectedAttachments(fileList) {
      var files = Array.prototype.slice.call(fileList || []);
      var payload = [];
      for (var index = 0; index < files.length; index += 1) {
        var file = files[index];
        payload.push({
          name: file.name,
          mimeType: file.type || 'application/octet-stream',
          size: file.size || 0,
          base64: await readFileAsBase64(file)
        });
      }
      return payload;
    }

    function getAttachmentDisplayItems() {
      if (!state.modalForm) return [];
      var existing = (state.modalForm.existingAttachments || []).map(function (item) {
        return {
          kind: 'existing',
          id: item.id || item.url || item.name,
          name: item.name || item.originalName || 'Attachment',
          url: item.url || ''
        };
      });
      var pending = (state.modalForm.pendingAttachments || []).map(function (item, index) {
        return {
          kind: 'pending',
          id: 'pending-' + index + '-' + item.name,
          name: item.name || 'Attachment',
          url: ''
        };
      });
      return existing.concat(pending);
    }

    function buildGridQuery(moduleKey, dataset) {
      var gridState = getGridState(moduleKey, dataset || { defaultSort: {} });
      return {
        page: gridState && gridState.page ? gridState.page : 1,
        pageSize: dataset && dataset.pageSize ? dataset.pageSize : 50,
        sortKey: gridState && gridState.sortKey ? gridState.sortKey : '',
        sortDir: gridState && gridState.sortDir ? gridState.sortDir : 'asc',
        filters: gridState && gridState.filters ? gridState.filters : {},
        dateFilters: gridState && gridState.dateFilters ? gridState.dateFilters : {}
      };
    }

    function saveToken(token) {
      localStorage.setItem('nijjara-gas-session', token || '');
    }

    function getToken() {
      return localStorage.getItem('nijjara-gas-session') || '';
    }

    function saveExecutiveReportRecipients(value) {
      localStorage.setItem('nijjara-executive-report-recipients', value || '');
    }

    function getExecutiveReportRecipients() {
      return localStorage.getItem('nijjara-executive-report-recipients') || '';
    }

    function canOpenExecutiveReport() {
      if (!state.bootstrap || !state.bootstrap.moduleActions) return false;
      var actions = state.bootstrap.moduleActions;
      return !!(
        (actions.financialReporting && actions.financialReporting.view) ||
        (actions.reportExtraction && actions.reportExtraction.view) ||
        (actions.reportDownloading && actions.reportDownloading.view) ||
        (actions.businessAnalysisReporting && actions.businessAnalysisReporting.view)
      );
    }

    function getDesktopViewport() {
      var desktop = root.querySelector('.workspace-desktop');
      if (!desktop) {
        return {
          width: Math.max(window.innerWidth - 24, 720),
          height: Math.max(window.innerHeight - 96, 420)
        };
      }
      return {
        width: Math.max(desktop.clientWidth, 720),
        height: Math.max(desktop.clientHeight, 420)
      };
    }

    function applyWindowBoundsToElement(id) {
      var target = getWindowById(id);
      var element = root.querySelector('#window-' + id);
      if (!target || !element) return;
      element.style.right = target.x + 'px';
      element.style.top = target.y + 'px';
      element.style.width = target.width + 'px';
      element.style.height = target.height + 'px';
    }

    function dismissToast(id) {
      state.toasts = state.toasts.filter(function (item) { return item.id !== id; });
      render();
    }

    function toast(type, message) {
      var entry = {
        id: Date.now() + Math.random(),
        type: type,
        message: message,
        createdAt: Date.now()
      };
      state.toasts.push(entry);
      if (type === 'error') {
        console.error('[NIJJARA ERROR TOAST]', message);
      } else if (type === 'success') {
        console.info('[NIJJARA SUCCESS TOAST]', message);
      } else {
        console.log('[NIJJARA TOAST]', message);
      }
      render();
      var lifetime = type === 'error' ? 20000 : 5200;
      setTimeout(function () {
        dismissToast(entry.id);
      }, lifetime);
    }

    function noAccessToastMessage() {
      return 'ليس لديك صلاحية للوصول إلى هذه الوحدة. يرجى التواصل مع الإدارة لمنحك الصلاحيات.';
    }

    function denyAccessInstantly(message) {
      state.loading = null;
      toast('error', message || noAccessToastMessage());
      render();
    }

    function isHardDeniedGroupKey(groupKey) {
      if (!state.session || !state.bootstrap) return false;
      var roles = Array.isArray(state.bootstrap.roles) ? state.bootstrap.roles : [];
      if (roles.indexOf('super_admin') !== -1 || roles.indexOf('general_manager') !== -1) return false;
      if (roles.indexOf('employee_self_service') === -1 || roles.indexOf('employee') !== -1) return false;
      return ['notificationsAudit', 'reportsExports'].indexOf(String(groupKey || '')) !== -1;
    }

    function isHardDeniedModuleKey(moduleKey) {
      if (!state.session || !state.bootstrap) return false;
      var roles = Array.isArray(state.bootstrap.roles) ? state.bootstrap.roles : [];
      if (roles.indexOf('super_admin') !== -1 || roles.indexOf('general_manager') !== -1) return false;
      if (roles.indexOf('employee_self_service') === -1 || roles.indexOf('employee') !== -1) return false;
      return ['notifications', 'auditLogs', 'sourceRecordTraceability', 'reportExtraction', 'reportDownloading', 'businessAnalysisReporting'].indexOf(String(moduleKey || '')) !== -1;
    }

    function setLoading(message) {
      state.loading = message ? { message: message } : null;
      render();
    }

    async function withLoading(message, work) {
      setLoading(message);
      try {
        return await work();
      } finally {
        state.loading = null;
        render();
      }
    }

    async function openExecutiveReportModal() {
      if (!state.session || !canOpenExecutiveReport()) {
        denyAccessInstantly();
        return;
      }
      var report = await withLoading('جارٍ تجهيز التقرير التنفيذي...', function () {
        return callServer('nijjaraGetExecutiveReport', state.session.token);
      });
      state.executiveReport = {
        data: report,
        recipients: getExecutiveReportRecipients()
      };
      render();
    }

    function closeExecutiveReportModal() {
      state.executiveReport = null;
      render();
    }

    async function downloadExecutiveReportHtml() {
      if (!state.executiveReport || !state.executiveReport.data) return;
      await withLoading('جارٍ تجهيز ملف PDF...', async function () {
        var iframe = root.querySelector('#executiveReportPreviewFrame');
        var frameDocument = iframe && iframe.contentDocument;
        if (!iframe || !frameDocument || !window.html2pdf) {
          throw new Error('تعذر تجهيز التقرير للتنزيل حالياً.');
        }
        var sourceShell = frameDocument.querySelector('.shell');
        if (!sourceShell) {
          throw new Error('تعذر العثور على محتوى التقرير.');
        }
        var exportContainer = document.createElement('div');
        exportContainer.style.position = 'fixed';
        exportContainer.style.left = '-20000px';
        exportContainer.style.top = '0';
        exportContainer.style.width = '1180px';
        exportContainer.style.background = '#0f1014';
        exportContainer.style.padding = '0';
        exportContainer.style.margin = '0';
        var styleBundle = document.createElement('style');
        styleBundle.textContent = Array.prototype.map.call(frameDocument.querySelectorAll('style'), function (style) {
          return style.textContent || '';
        }).join('\n');
        exportContainer.appendChild(styleBundle);
        exportContainer.appendChild(sourceShell.cloneNode(true));
        document.body.appendChild(exportContainer);
        try {
          if (document.fonts && document.fonts.ready) {
            await document.fonts.ready;
          }
          await new Promise(function (resolve) { setTimeout(resolve, 350); });
          await window.html2pdf()
          .set({
            margin: [6, 6, 6, 6],
            filename: state.executiveReport.data.fileName || 'Nijjara_DailyReport.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: {
              scale: 2.2,
              useCORS: true,
              backgroundColor: '#0f1014',
              scrollX: 0,
              scrollY: 0
            },
            jsPDF: {
              unit: 'mm',
              format: 'a4',
              orientation: 'portrait'
            },
            pagebreak: {
              mode: ['css', 'legacy']
            }
          })
          .from(exportContainer)
          .save();
        } finally {
          exportContainer.remove();
        }
      });
    }

    async function emailExecutiveReport() {
      if (!state.executiveReport) return;
      var recipientsField = root.querySelector('#executiveReportRecipients');
      var recipients = recipientsField ? recipientsField.value : state.executiveReport.recipients || '';
      if (!recipients.trim()) {
        toast('error', 'أدخل بريدًا إلكترونيًا واحدًا على الأقل.');
        return;
      }
      saveExecutiveReportRecipients(recipients);
      state.executiveReport.recipients = recipients;
      await withLoading('جارٍ إرسال التقرير...', function () {
        return callServer('nijjaraEmailExecutiveReport', state.session.token, recipients);
      });
      toast('success', 'تم إرسال التقرير بنجاح.');
      render();
    }

    function shareExecutiveReportToWhatsapp() {
      if (!state.executiveReport || !state.executiveReport.data) return;
      var text = state.executiveReport.data.whatsAppText || '';
      if (!text) {
        toast('error', 'لا توجد بيانات قابلة للمشاركة حالياً.');
        return;
      }
      window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank', 'noopener');
    }

    async function ensureLookupsLoaded(requiredSources) {
      requiredSources = Array.isArray(requiredSources) ? requiredSources.filter(Boolean) : [];
      if (state.bootstrap && state.bootstrap.lookups) {
        var hasAll = requiredSources.every(function (sourceName) {
          return Array.isArray(state.bootstrap.lookups[sourceName]);
        });
        if (!requiredSources.length || hasAll) return state.bootstrap.lookups;
      }
      var lookups = requiredSources.length
        ? await callServer('nijjaraGetLookupSubset', state.session.token, requiredSources)
        : await callServer('nijjaraGetLookups', state.session.token);
      state.bootstrap.lookups = Object.assign({}, state.bootstrap.lookups || {}, lookups || {});
      return state.bootstrap.lookups;
    }

    async function ensureNotificationsLoaded(force) {
      if (!state.bootstrap) return [];
      if (state.notificationsLoading && !force) {
        return Array.isArray(state.bootstrap.notifications) ? state.bootstrap.notifications : [];
      }
      if (!force && state.notificationsLoaded) {
        return state.bootstrap.notifications;
      }
      state.notificationsLoading = true;
      try {
        var notifications = await callServer('nijjaraGetNotifications', state.session.token);
        state.bootstrap.notifications = Array.isArray(notifications) ? notifications : [];
        state.notificationsLoaded = true;
        return state.bootstrap.notifications;
      } finally {
        state.notificationsLoading = false;
      }
    }

    function warmNotifications(force) {
      if (!state.session || !state.bootstrap) return Promise.resolve([]);
      return ensureNotificationsLoaded(!!force).then(function (notifications) {
        render();
        return notifications;
      }).catch(function () {
        return Array.isArray(state.bootstrap.notifications) ? state.bootstrap.notifications : [];
      });
    }

    function seedRecordViewModal(moduleKey, row, dataset) {
      var schema = formSchemaFor(moduleKey);
      if (!schema || !row) return false;
      state.modalForm = {
        moduleKey: moduleKey,
        mode: 'view',
        schema: schema,
        existingAttachments: [],
        pendingAttachments: [],
        summary: deriveSummaryValues(row.formValues || row.values || {}, {
          moduleKey: moduleKey,
          schema: schema,
          attachments: []
        }),
        values: Object.assign({}, row.formValues || row.values || {}),
        recordId: row.id
      };
      render();
      return true;
    }

    async function hydrateWorkspacePanels() {
      if (!state.bootstrap || state.bootstrap.dashboard) return;
      try {
        state.bootstrap.dashboard = await callServer('nijjaraGetDashboard', state.session.token);
        render();
      } catch (error) {
        toast('error', error.message);
      }
    }

    async function prefetchMarkedModules() {
      if (!state.session || !state.bootstrap || state._markedPrefetchStarted) return;
      state._markedPrefetchStarted = true;
      var moduleKeys = ['users', 'roles', 'actionPermissions', 'employees', 'expenses', 'projectRevenueTracking', 'internalChannels', 'internalRevenuePayments', 'showroomOrders', 'recordPayment', 'employeesAdvances', 'partnersData', 'projects', 'clients', 'projectBudgets', 'projectDirectExpenses', 'projectStatusMonitoring', 'notifications', 'auditLogs'];
      for (var index = 0; index < moduleKeys.length; index += 1) {
        try {
          await ensureModuleDataLoaded(moduleKeys[index], false, { silent: true, skipRender: true });
        } catch (error) {}
        await delay(80);
      }
      try {
        await ensureCustodyDataLoaded({ silent: true, skipRender: true });
      } catch (error) {}
      ['expenses', 'projectDirectExpenses'].forEach(function (moduleKey, index) {
        setTimeout(function () {
          prefetchLargeModuleCache(moduleKey).catch(function () {});
        }, 400 + index * 120);
      });
    }

    async function prefetchLargeModuleCache(moduleKey) {
      moduleKey = String(moduleKey || '');
      if (!supportsLargeModuleCache(moduleKey) || !state.session) return null;
      if (state.largeModuleCaches[moduleKey] && (state.largeModuleCaches[moduleKey].ready || state.largeModuleCaches[moduleKey].loading)) {
        return state.largeModuleCaches[moduleKey].dataset || null;
      }
      state.largeModuleCaches[moduleKey] = { loading: true, ready: false, dataset: null };
      var page = 1;
      var pageSize = 250;
      var allRows = [];
      var baseDataset = null;
      while (true) {
        var response = await callServer('nijjaraQueryModuleDataset', state.session.token, moduleKey, {
          page: page,
          pageSize: pageSize,
          sortKey: '',
          sortDir: 'asc',
          filters: {},
          dateFilters: {}
        });
        if (!baseDataset) baseDataset = response;
        allRows = allRows.concat((response && response.rows) || []);
        if (!response || !response.rows || !response.rows.length || allRows.length >= Number(response.totalRows || 0)) {
          break;
        }
        page += 1;
      }
      var dataset = baseDataset ? {
        moduleKey: moduleKey,
        label: baseDataset.label,
        pageSize: 50,
        defaultSort: baseDataset.defaultSort,
        columns: baseDataset.columns,
        rows: allRows,
        totalRows: allRows.length,
        serverPaged: false,
        canCreate: baseDataset.canCreate,
        canEdit: baseDataset.canEdit,
        canDelete: baseDataset.canDelete
      } : null;
      state.largeModuleCaches[moduleKey] = { loading: false, ready: !!dataset, dataset: dataset };
      if (dataset && state.datasets[moduleKey]) {
        state.datasets[moduleKey] = dataset;
        render();
      }
      return dataset;
    }

    async function handleOpenFormRequest(key) {
      var permissionKey = key === 'custodyAccount' || key === 'custodyAdjustment' ? 'custody' : key;
      var schema = formSchemaFor(key);
      if (!state.bootstrap.moduleActions[permissionKey] || !state.bootstrap.moduleActions[permissionKey].create && key !== 'custodyAdjustment') {
        if (key === 'custodyAdjustment' && (!state.bootstrap.custodyData || !state.bootstrap.custodyData.actions.canAdjustBalance)) {
          toast('error', 'ليس لديك صلاحية لتعديل الرصيد.');
          return;
        }
      }
      if (key !== 'custodyAdjustment' && (!state.bootstrap.moduleActions[permissionKey] || !state.bootstrap.moduleActions[permissionKey].create)) {
        toast('error', 'ليس لديك صلاحية لإضافة سجل جديد.');
        return;
      }
      if (!schema) {
        toast('error', 'لا يوجد نموذج إضافة متاح لهذا القسم حالياً.');
        return;
      }
      var lookupFields = (schema.mainFields || []).concat(schema.dynamicFields || []).filter(function (field) {
        return fieldSupportsMode(field, 'new');
      });
      var requiredSources = lookupFields.filter(function (field) {
        return field.type === 'dynamic-select' || field.type === 'smart-search' || field.type === 'checklist' || field.type === 'access-matrix';
      }).map(function (field) {
        return [field.source, field.fallbackSource, field.scopeSource].filter(Boolean);
      }).reduce(function (collection, sources) {
        return collection.concat(sources);
      }, []);
      var needsLookups = requiredSources.length > 0;
      var defaultFormValues = key === 'users' ? { primaryRoleCode: 'employee', accessRules: [] }
        : key === 'recordPayment' ? { paymentDate: new Date().toISOString().slice(0, 10) }
        : {};
      state.modalForm = { moduleKey: key, mode: 'new', schema: schema, existingAttachments: [], pendingAttachments: [], summary: null, values: defaultFormValues };
      render();
      if (needsLookups) {
        ensureLookupsLoaded(requiredSources).then(function () {
          render();
        }).catch(function (error) {
          toast('error', error.message);
        });
      }
    }

    window.nijjaraOpenForm = function (key) {
      return handleOpenFormRequest(key).catch(function (error) {
        toast('error', error.message);
        throw error;
      });
    };

    function bindGlobalEvents() {
      if (globalEventsBound) return;
      globalEventsBound = true;

    function formatDateValue(value) {
      if (!value) return '—';
      var arabicMonths = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
      function toArabicDigits(text) {
        return String(text).replace(/\d/g, function (digit) {
          return ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'][Number(digit)];
        });
      }
      var date = new Date(value);
      if (isNaN(date.getTime())) {
        var directMatch = String(value).match(/(\d{4})-(\d{2})-(\d{2})/);
        if (directMatch) {
          return toArabicDigits(Number(directMatch[3])) + ' ' + arabicMonths[Math.max(0, Number(directMatch[2]) - 1)] + ' ' + toArabicDigits(directMatch[1]);
        }
        return toArabicDigits(String(value).replace(/[‏‎]/g, '').replace(/\//g, '-'));
      }
      var cairoDate = new Date(date.toLocaleString('en-US', { timeZone: 'Africa/Cairo' }));
      var day = toArabicDigits(('0' + cairoDate.getDate()).slice(-2));
      var monthName = arabicMonths[cairoDate.getMonth()] || '';
      var year = toArabicDigits(cairoDate.getFullYear());
      return day + ' ' + monthName + ' ' + year;
    }

    function formatDateTimeValue(value) {
      if (!value) return '—';
      var date = new Date(value);
      if (isNaN(date.getTime())) {
        var raw = String(value || '');
        var split = raw.split(/[T ]/);
        var datePart = split[0] || raw;
        var timeMatch = raw.match(/(\d{1,2}):(\d{2})/);
        if (!timeMatch) return formatDateValue(datePart);
        var hours = Number(timeMatch[1] || 0);
        var minutes = timeMatch[2];
        var meridiem = hours >= 12 ? 'م' : 'ص';
        var hour12 = hours % 12 || 12;
        return formatDateValue(datePart) + ' - ' + hour12 + ':' + minutes + ' ' + meridiem;
      }
      var cairoDate = new Date(date.toLocaleString('en-US', { timeZone: 'Africa/Cairo' }));
      var hours = cairoDate.getHours();
      var minutes = ('0' + cairoDate.getMinutes()).slice(-2);
      var meridiem = hours >= 12 ? 'م' : 'ص';
      var hour12 = hours % 12 || 12;
      return formatDateValue(cairoDate.toISOString()) + ' - ' + hour12 + ':' + minutes + ' ' + meridiem;
    }

    function formatTimeValue(value) {
      if (!value) return '—';
      var match = String(value).match(/^(\d{1,2}):(\d{2})/);

      var hour = ('0' + match[1]).slice(-2);
      return hour + ':' + match[2];
    }

    function formatMobileValue(value) {

    function startWindowDrag(id, event) {

      focusWindow(id);
      var startX = event.clientX;
      var startY = event.clientY;
      var origin = { x: target.x, y: target.y };

      function onMove(moveEvent) {
        updateWindowBounds(id, {
          x: Math.max(0, origin.x - (moveEvent.clientX - startX)),
          y: Math.max(0, origin.y + (moveEvent.clientY - startY)),
          width: target.width,
          height: target.height
        });
        applyWindowBoundsToElement(id);
      }

      function onUp() {
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      }

      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    }

          return;
        }

      if (['true', '1', 'yes', 'allow'].indexOf(text) !== -1) return true;

    function isProjectsRevenueChannel(value) {
      if (!value) return false;

      return String(channel.label || '').indexOf('المشاريع') !== -1 || String(channel.sublabel || '').indexOf('PRJ_Projects') !== -1;

    function getVisibleMainFieldNames(moduleKey, schema, values) {
      values = values || {};
      var names = [];
      (schema.mainFields || []).forEach(function (field) {
        if (!fieldSupportsMode(field)) return;
        var visible = true;
        if (moduleKey === 'custodyAccount') {
          if (field.name === 'linkedEmployeeId') visible = String(values.holderTypeCode || '').toUpperCase() === 'EMPLOYEE';
          if (field.name === 'linkedPartnerId') visible = String(values.holderTypeCode || '').toUpperCase() === 'PARTNER';
        }
        if (moduleKey === 'recordPayment') {
          var rpCat = String(values.paymentCategory || '').trim().toUpperCase();
          var rpSub = String(values.internalSubType || '').trim().toUpperCase();
          if (field.name === 'paymentCategory') visible = true;
          else if (field.name === 'projectId') visible = rpCat === 'PROJECT';
          else if (field.name === 'internalSubType') visible = rpCat === 'INTERNAL';
          else if (field.name === 'showroomOrderId') visible = rpCat === 'INTERNAL' && rpSub === 'SHOWROOM';
          else if (field.name === 'factoryOrderName') visible = rpCat === 'INTERNAL' && rpSub === 'FACTORY_MACHINERY';
          else if (field.name === 'totalOrderCost') visible = rpCat === 'INTERNAL' && rpSub === 'FACTORY_MACHINERY';
          else if (field.name === 'amount' || field.name === 'paymentDate' || field.name === 'receivedCustodyAccountId' || field.name === 'notes') visible = !!rpCat;
          else visible = !!rpCat;
        }
        if (visible) names.push(field.name);
      });
      return names;
    }

    function getVisibleDynamicFieldNames(moduleKey, schema, values) {
      values = values || {};
      var names = [];
      (schema.dynamicFields || []).forEach(function (field) {
        if (!fieldSupportsMode(field)) return;
        var visible = true;
        if (moduleKey === 'expenses') {
          var allocationCode = (function (raw) {
            var value = String(raw || '').trim();
            if (!value) return '';
            if (value === 'PROJECT' || value === 'FACTORY' || value === 'INTERNAL_REVENUE') return value;
            var lookup = getLookupByValue('allocationChannels', value) || null;
            var label = lookup ? String(lookup.label || '') : '';
            var sublabel = lookup ? String(lookup.sublabel || '') : '';
            if (label.indexOf('المشاريع') !== -1 || sublabel.indexOf('PRJ_Projects') !== -1) return 'PROJECT';
            if (label.indexOf('المصنع') !== -1 || sublabel.indexOf('Factory') !== -1) return 'FACTORY';
            return 'INTERNAL_REVENUE';
          })(values.allocationChannel);
          if (field.name === 'categoryInfo' || field.name === 'subCategoryInfo') {
            visible = !!String(values.expenseSmartSearch || '').trim();
          } else if (field.name === 'expenseTypeInfo') {
            visible = allocationCode === 'FACTORY' && !!String(values.expenseSmartSearch || '').trim();
          } else if (field.name === 'projectId') {
            visible = allocationCode === 'PROJECT';
          } else if (field.name === 'internalRevenueMode') {
            visible = allocationCode === 'INTERNAL_REVENUE';
          } else if (field.name === 'depreciationPeriod') {
            visible = allocationCode === 'FACTORY' && (String(values.expenseTypeInfo || '') === 'NON_PERIODICAL' || String(values.expenseTypeInfo || '') === 'ASSET');
          } else if (field.name === 'periodStartDate' || field.name === 'periodEndDate') {
            visible = allocationCode === 'FACTORY' && String(values.expenseTypeInfo || '') === 'INDIRECT_PERIODICAL';
          }
        } else if (moduleKey === 'custody') {
          if (field.name === 'sourceBalance') visible = !!String(values.sourceCustody || '').trim();
          if (field.name === 'destinationBalance') visible = !!String(values.destinationCustody || '').trim();
        } else if (moduleKey === 'custodyAccount') {
          if (field.name === 'linkedEmployeeId') visible = String(values.holderTypeCode || '').toUpperCase() === 'EMPLOYEE';
          if (field.name === 'linkedPartnerId') visible = String(values.holderTypeCode || '').toUpperCase() === 'PARTNER';
          if (field.name === 'sourceCustodyAccountId') visible = String(values.fundingSourceType || '').toUpperCase() === 'FROM_CUSTODY';
        } else if (moduleKey === 'custodyAdjustment') {
          if (field.name === 'balanceBefore' || field.name === 'adjustmentAmount') visible = !!String(values.custodyAccountId || '').trim();
        } else if (moduleKey === 'income') {
          if (field.name === 'projectId') visible = isProjectsRevenueChannel(values.revenueChannel);
          if (field.name === 'statement') visible = !!String(values.revenueChannel || '').trim();
        } else if (moduleKey === 'recordPayment') {
          visible = false;
        } else if (moduleKey === 'projectRevenueTracking') {
          visible = !!String(values.projectId || '').trim();
        } else if (moduleKey === 'internalRevenuePayments') {
          visible = !!String(values.internalChannelId || '').trim();
        } else if (moduleKey === 'projectBudgets') {
          visible = !!String(values.projectId || '').trim();
        } else if (moduleKey === 'collections') {
          visible = !!String(values.projectId || '').trim();
        }
        if (visible) names.push(field.name);
      });
      return names;
    }

    function fieldSpanClass(field) {
      var span = Number(field && field.span ? field.span : 0) || 0;
      if (!span) {
        if (field && field.type === 'smart-search') span = 2;
        if (field && field.type === 'textarea') span = 4;
      }
      if (span >= 4) return ' field--span-4';
      if (span === 3) return ' field--span-3';
      if (span === 2) return ' field--span-2';

    function renderAuth() {
      var loginUsername = e(state.authDraft.username || '');
      var loginPassword = e(state.authDraft.password || '');
      var createEmail = e(state.authDraft.email || '');
      var forgotIdentifier = e(state.authDraft.identifier || '');
      var setupPassword = e(state.authDraft.setupPassword || '');
      var setupPasswordConfirm = e(state.authDraft.setupPasswordConfirm || '');
      root.innerHTML = '' +
        '<div class="login-shell">' +
          '<main class="login-card">' +
            '<div class="login-card__brand"><h1>NIJJARA</h1><p>Sovereign Intelligence Systems</p></div>' +
            (state.authMode === 'setup'
              ? '<div class="auth-feedback auth-feedback--static"><strong>' + e((state.authFlowContext && state.authFlowContext.displayName) || '') + '</strong><br>' + e((state.authFlowContext && state.authFlowContext.email) || '') + '</div>'
              : '<div class="auth-tabs">' +
              '<button class="auth-tab ' + (state.authMode === 'login' ? 'auth-tab--active' : '') + '" data-auth-mode="login">تسجيل الدخول</button>' +
              '<button class="auth-tab ' + (state.authMode === 'create' ? 'auth-tab--active' : '') + '" data-auth-mode="create">إنشاء مستخدم</button>' +
              '<button class="auth-tab ' + (state.authMode === 'forgot' ? 'auth-tab--active' : '') + '" data-auth-mode="forgot">نسيت كلمة المرور</button>' +
            '</div>') +
            '<div class="auth-feedback" id="authFeedback"></div>' +
            '<form class="auth-form" id="authForm">' +
              (state.authMode === 'login'
                ? '<div class="field"><label>اسم المستخدم</label><input name="username" value="' + loginUsername + '" required></div><div class="field"><label>كلمة المرور</label><input name="password" type="password" value="' + loginPassword + '" required></div><div class="auth-actions"><button class="action-button action-button--primary" type="submit">دخول النظام</button></div>'
                : '') +
              (state.authMode === 'create'
                ? '<div class="field"><label>البريد الإلكتروني</label><input name="email" value="' + createEmail + '" type="email" required></div><div class="auth-actions"><button class="action-button action-button--primary" type="submit">إرسال رابط إنشاء الحساب</button></div>'
                : '') +
              (state.authMode === 'forgot'
                ? '<div class="field"><label>البريد الإلكتروني</label><input name="identifier" value="' + forgotIdentifier + '" type="email" required></div><div class="auth-actions"><button class="action-button action-button--primary" type="submit">إرسال رابط إعادة التعيين</button></div>'
                : '') +
              (state.authMode === 'setup'
                ? '<div class="field"><label>كلمة المرور الجديدة</label><input name="setupPassword" type="password" value="' + setupPassword + '" required></div><div class="field"><label>تأكيد كلمة المرور</label><input name="setupPasswordConfirm" type="password" value="' + setupPasswordConfirm + '" required></div><div class="auth-actions"><button class="action-button action-button--primary" type="submit">حفظ كلمة المرور والدخول</button></div>'
                : '') +
            '</form>' +
          '</main>' +
        '</div>' + renderLoader() + renderToasts();

      Array.prototype.forEach.call(root.querySelectorAll('[data-auth-mode]'), function (button) {
        button.addEventListener('click', function () {
          state.authMode = button.getAttribute('data-auth-mode');
          render();
        });
      });

      Array.prototype.forEach.call(root.querySelectorAll('#authForm input'), function (input) {
        input.addEventListener('input', function () {
          if (state.authMode === 'login') {
            if (input.name === 'username') state.authDraft.username = input.value;
            if (input.name === 'password') state.authDraft.password = input.value;
          }
          if (state.authMode === 'create') {
            if (input.name === 'email') state.authDraft.email = input.value;
          }
          if (state.authMode === 'forgot' && input.name === 'identifier') state.authDraft.identifier = input.value;
          if (state.authMode === 'setup') {
            if (input.name === 'setupPassword') state.authDraft.setupPassword = input.value;
            if (input.name === 'setupPasswordConfirm') state.authDraft.setupPasswordConfirm = input.value;
          }
        });
      });

      root.querySelector('#authForm').addEventListener('submit', async function (event) {
        event.preventDefault();
        var feedback = root.querySelector('#authFeedback');
        feedback.textContent = '';
        var data = new FormData(event.target);
        try {
            if (state.authMode === 'login') {
              state.booting = false;
              feedback.textContent = 'جارٍ تسجيل الدخول...';
              setLoading('جارٍ تسجيل الدخول...');
              var session = await callServer('nijjaraLogin', data.get('username'), data.get('password'));
              state.session = session;
              state.windows = [];
              state.datasets = {};
              state.gridStates = {};
              state.largeModuleCaches = {};
              state.modalForm = null;
              saveToken(session.token);
              await loadBootstrap();
              state.authDraft = {};
              state.loading = null;
            toast('success', 'Login completed successfully.');
            return;
          }
          if (state.authMode === 'create') {
            feedback.textContent = 'Sending your account setup email...';
            await callServer('nijjaraStartSelfRegistration', data.get('email'));
            toast('success', 'The account setup email has been sent.');
            render();
            return;
          }
          if (state.authMode === 'forgot') {
            feedback.textContent = 'Sending your reset email...';
            await callServer('nijjaraRequestPasswordReset', data.get('identifier'));
            toast('info', 'The reset email has been sent.');
            return;
          }
            feedback.textContent = 'Completing your account setup...';
            var setupSession = await callServer('nijjaraCompletePasswordSetup', state.authFlowToken, data.get('setupPassword'), data.get('setupPasswordConfirm'));
            state.session = setupSession;
            state.windows = [];
            state.datasets = {};
            state.gridStates = {};
            state.largeModuleCaches = {};
            state.modalForm = null;
            saveToken(setupSession.token);
            await loadBootstrap();
            state.authDraft = {};
          state.loading = null;
          toast('success', 'Your password has been saved and you are now signed in.');
        } catch (error) {
          state.loading = null;
          feedback.textContent = error.message;
          toast('error', error.message);
          render();
        }
      });

      Array.prototype.forEach.call(root.querySelectorAll('#authForm input'), function (input) {
        input.addEventListener('keydown', function (event) {
          if (event.key === 'Enter') {
            event.preventDefault();
            root.querySelector('#authForm').requestSubmit();
          }
        });
      });
    }

    async function loadBootstrap(options) {
      options = options || {};
      if (!state.loading) setLoading('جارٍ تحميل مساحة العمل...');
      state.bootstrap = await callServer('nijjaraGetBootstrap', state.session.token, {
        includeLookups: false,
        includeNotifications: false,
        includeDashboard: false
      });

        if (options.commit !== false) {

          if (!state.gridStates[moduleKey] || force) {
            state.gridStates[moduleKey] = defaultGridState(unifiedDataset);
          }
          if (!options.skipRender) render();
        }
        return unifiedDataset;
      }
      if (isServerGridModule(moduleKey) && supportsLargeModuleCache(moduleKey) && state.largeModuleCaches[moduleKey] && state.largeModuleCaches[moduleKey].ready && state.largeModuleCaches[moduleKey].dataset) {
        if (options.commit !== false) {
          state.datasets[moduleKey] = state.largeModuleCaches[moduleKey].dataset;

        }
        return state.largeModuleCaches[moduleKey].dataset;
      }
      if (!force && state.datasets[moduleKey]) return state.datasets[moduleKey];
      async function loadDatasetAttempt_() {
        var lastError = null;
        for (var attempt = 0; attempt < 3; attempt += 1) {
          try {
            var response = isServerGridModule(moduleKey)
              ? await callServer('nijjaraQueryModuleDataset', state.session.token, moduleKey, buildGridQuery(moduleKey, state.datasets[moduleKey] || { pageSize: 50, defaultSort: {} }))
              : await callServer('nijjaraGetModuleDataset', state.session.token, moduleKey);
            if (response && Array.isArray(response.columns) && Array.isArray(response.rows)) {
              return response;
            }
            lastError = new Error('Module data is not available yet.');
          } catch (error) {
            lastError = error;
          }
          if (attempt < 2) {
            await delay(220 * (attempt + 1));
          }
        }
        throw lastError || new Error('Failed to load module data.');
      }
      var dataset = options.silent
        ? await loadDatasetAttempt_()
        : await withLoading('جارٍ تحميل البيانات...', loadDatasetAttempt_);
      if (options.commit !== false) {
        state.datasets[moduleKey] = dataset;
        if (!state.gridStates[moduleKey] || force) {

        }
        if (!options.skipRender) render();

    async function refreshGridData(moduleKey, options) {
      options = options || {};
      if (!isServerGridModule(moduleKey)) {
        render();
        return;
      }
      if (options.debounceMs) {
        if (state.gridRefreshTimers[moduleKey]) {
          clearTimeout(state.gridRefreshTimers[moduleKey]);
        }
        return new Promise(function (resolve) {
          state.gridRefreshTimers[moduleKey] = setTimeout(function () {
            delete state.gridRefreshTimers[moduleKey];
            refreshGridData(moduleKey, {}).then(resolve).catch(function () { resolve(); });
          }, options.debounceMs);
        });
      }
      var seq = (state.gridRefreshSeq[moduleKey] || 0) + 1;
      state.gridRefreshSeq[moduleKey] = seq;
      state.gridBusy[moduleKey] = true;
      render();
      try {
        var dataset = await ensureModuleDataLoaded(moduleKey, true, { silent: true, skipRender: true, commit: false });
        if (state.gridRefreshSeq[moduleKey] !== seq) return;
        state.datasets[moduleKey] = dataset;
        if (!state.gridStates[moduleKey]) {
          state.gridStates[moduleKey] = defaultGridState(dataset);
        }
      } catch (error) {
        if (state.gridRefreshSeq[moduleKey] === seq) {
          toast('error', error.message);

      } finally {
        if (state.gridRefreshSeq[moduleKey] === seq) {

    function upsertDatasetRow(moduleKey, record) {
      if (!moduleKey || !record || !state.datasets[moduleKey]) return;

      var nextRow = {
        id: record.id,
        values: Object.assign({}, record.values || {}),
        formValues: Object.assign({}, record.formValues || record.values || {})
      };
      var existingIndex = dataset.rows.findIndex(function (entry) {
        return String(entry.id) === String(nextRow.id);
      });
      if (existingIndex === -1) {
        dataset.rows.unshift(nextRow);
        dataset.totalRows = Number(dataset.totalRows || 0) + 1;
      } else {
        dataset.rows.splice(existingIndex, 1, nextRow);
      }
    }

        return String(entry.id) !== String(recordId);
      });
      if (dataset.totalRows != null) {

    function getDatasetForModule(moduleKey) {
      if (String(moduleKey || '').indexOf('custody:') === 0 && state.bootstrap && state.bootstrap.custodyData) {

    function getGridState(moduleKey, dataset) {
      if (!state.gridStates[moduleKey] && dataset) {
        state.gridStates[moduleKey] = defaultGridState(dataset);
      }
      return state.gridStates[moduleKey] || null;

    function normalizeSearchTerm(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/[أإآ]/g, 'ا')
        .replace(/ة/g, 'ه')
        .replace(/ى/g, 'ي')
        .trim();
    }

    function filterValueForColumn(row, columnKey) {
      var value = row.values ? row.values[columnKey] : '';
      if (value == null) return '';
      if (typeof value === 'object' && value.ar !== undefined) {
        return [value.ar, value.en].join(' | ');
      }
       if (typeof value === 'string') {
        var lookup = findLookupEntry(value);
        if (lookup) return [value, lookup.label, lookup.sublabel].join(' | ');
      }
      return String(value);
    }

    function normalizeDateOnlyValue(value) {
      if (!value) return '';
      if (Object.prototype.toString.call(value) === '[object Date]' && !isNaN(value.getTime())) {
        return value.toISOString().slice(0, 10);
      }
      var text = String(value || '').trim();
      if (!text) return '';
      var directMatch = text.match(/(\d{4})-(\d{2})-(\d{2})/);
      if (directMatch) return [directMatch[1], directMatch[2], directMatch[3]].join('-');
      var parsed = new Date(text);
      if (!isNaN(parsed.getTime())) return parsed.toISOString().slice(0, 10);
      return text;
    }

    function matchesDateFilter(rawValue, filter) {
      if (!filter) return true;
      var dateOnly = normalizeDateOnlyValue(rawValue);
      if (!dateOnly) return false;
      if (filter.mode === 'exact' && filter.exact) return dateOnly === filter.exact;
      if (filter.mode === 'range') {
        if (filter.from && dateOnly < filter.from) return false;
        if (filter.to && dateOnly > filter.to) return false;
      }
      return true;
    }

    function applyGridFiltering(dataset, gridState) {
      if (dataset.serverPaged) return dataset.rows.slice();
      return dataset.rows.filter(function (row) {
        return dataset.columns.every(function (column) {
          if (column.filterType === 'none') return true;
          if (column.filterType === 'date') {
            return matchesDateFilter(row.values[column.key], gridState.dateFilters[column.key]);
          }
          var filterText = normalizeSearchTerm(gridState.filters[column.key] || '');
          if (!filterText) return true;
          return normalizeSearchTerm(filterValueForColumn(row, column.key)).indexOf(filterText) !== -1;
        });
      });
    }

    function compareGridValues(left, right, columnType) {
      if (columnType === 'money' || columnType === 'number') {
        return (Number(left || 0) || 0) - (Number(right || 0) || 0);
      }
      if (columnType === 'date') {
        return String(left || '').localeCompare(String(right || ''));
      }
      if (columnType === 'datetime') {
        return String(left || '').localeCompare(String(right || ''));
      }
      if (typeof left === 'object' && left && left.ar !== undefined) {
        left = [left.ar, left.en].join(' ');
      }
      if (typeof right === 'object' && right && right.ar !== undefined) {
        right = [right.ar, right.en].join(' ');
      }
      return String(left || '').localeCompare(String(right || ''), 'ar');
    }

    function applyGridSorting(rows, dataset, gridState) {
      if (dataset.serverPaged) return rows.slice();
      var column = dataset.columns.find(function (item) { return item.key === gridState.sortKey; });
      if (!column || !column.sortable) return rows.slice();
      return rows.slice().sort(function (left, right) {
        var comparison = compareGridValues(left.values[column.key], right.values[column.key], column.type);
        return gridState.sortDir === 'desc' ? -comparison : comparison;
      });
    }

    function paginateRows(rows, pageSize, page) {
      if (!Array.isArray(rows)) return [];
      var start = (page - 1) * pageSize;
      return rows.slice(start, start + pageSize);
    }

    function renderGridCell(row, column, moduleKey, dataset) {
      var value = row.values[column.key];
      if (column.type === 'actions') {
        var recordLocked = !!(row.values && row.values.recordLocked);
        var editButton = (dataset.canEdit && !recordLocked) ? renderIconButton({ icon: 'edit', iconOnly: true, compact: true, tone: 'edit', title: 'تعديل', attrs: { 'data-action-module': moduleKey, 'data-edit-record': row.id } }) : '';
        var deleteButton = (dataset.canDelete && !recordLocked) ? renderIconButton({ icon: 'delete', iconOnly: true, compact: true, tone: 'delete', title: 'حذف', attrs: { 'data-action-module': moduleKey, 'data-delete-record': row.id } }) : '';
        return '<td class="module-table__actions">' +
          renderIconButton({ icon: 'view', iconOnly: true, compact: true, tone: 'view', title: 'عرض', attrs: { 'data-action-module': moduleKey, 'data-view-record': row.id } }) +
          editButton +
          deleteButton +
        '</td>';
      }
      if (column.type === 'view-action') {
        return '<td class="module-table__actions">' + renderIconButton({ icon: 'view', iconOnly: true, compact: true, tone: 'view', title: 'عرض', attrs: { 'data-action-module': moduleKey, 'data-view-record': row.id } }) + '</td>';
      }
      if (column.type === 'workflow-actions') {
        return '<td class="module-table__actions">' + (value || []).map(function (action) {
          var tone = action.code === 'APPROVE' ? 'edit' : action.code === 'REJECT' ? 'delete' : 'view';
          var icon = action.code === 'APPROVE' ? 'save' : action.code === 'REJECT' ? 'delete' : 'view';
          return renderIconButton({ icon: icon, iconOnly: true, compact: true, tone: tone, title: action.label, attrs: { 'data-transfer-id': row.id, 'data-transfer-action': action.code } });
        }).join('') + '</td>';
      }
      if (column.type === 'bilingual-name' && value && typeof value === 'object') {
        return '<td><div class="name-stack"><strong>' + e(value.ar || '—') + '</strong><span>' + e(value.en || '') + '</span></div></td>';
      }
      if (typeof value === 'string') {
        var lookup = findLookupEntry(value);
        if (lookup && (lookup.label || lookup.sublabel)) {
          return '<td><div class="name-stack"><strong>' + e(lookup.label || '—') + '</strong><span>' + e(lookup.sublabel || '') + '</span></div></td>';
        }
      }
      return '<td>' + e(formatDisplayValue(value, { name: column.key, type: column.type })) + '</td>';
    }

    function updateDateFilterPopoverVisibility(wrapper, mode) {
      if (!wrapper) return;
      var exact = wrapper.querySelector('.date-filter__picker');
      var range = wrapper.querySelector('.date-filter__range');
      if (exact) exact.style.display = mode === 'exact' ? '' : 'none';
      if (range) range.style.display = mode === 'range' ? '' : 'none';
    }

    function renderGridFilterCell(moduleKey, column, gridState, topActionsHtml) {
      if (column.type === 'actions' || column.type === 'view-action' || column.type === 'workflow-actions') {
        return '<th class="module-table__filter-cell module-table__filter-cell--actions">' + (topActionsHtml || '') + '</th>';
      }
      if (column.filterType === 'none') {
        return '<th class="module-table__filter-cell"></th>';
      }
      if (column.filterType === 'date') {
        var dateFilter = gridState.dateFilters[column.key] || { mode: 'exact', exact: '', from: '', to: '' };
        var displayLabel = dateFilter.mode === 'range'
          ? ((dateFilter.from || dateFilter.to) ? ((dateFilter.from ? formatDateValue(dateFilter.from) : 'من البداية') + ' ← ' + (dateFilter.to ? formatDateValue(dateFilter.to) : 'حتى اليوم')) : 'فترة')
          : (dateFilter.exact ? formatDateValue(dateFilter.exact) : 'يوم محدد');
        return '<th class="module-table__filter-cell">' +
          '<div class="date-filter" data-date-filter="' + e(moduleKey) + ':' + e(column.key) + '">' +
            '<button class="date-filter__trigger" type="button" data-date-trigger="' + e(moduleKey) + '" data-column-key="' + e(column.key) + '">' + e(displayLabel) + '</button>' +
            '<div class="date-filter__popover">' +
            '<select data-date-mode="' + e(moduleKey) + '" data-column-key="' + e(column.key) + '">' +
              '<option value="exact"' + (dateFilter.mode === 'exact' ? ' selected' : '') + '>يوم محدد</option>' +
              '<option value="range"' + (dateFilter.mode === 'range' ? ' selected' : '') + '>فترة</option>' +
            '</select>' +
            '<div class="date-filter__picker"' + (dateFilter.mode === 'exact' ? '' : ' style="display:none"') + '>' +
              '<input class="date-filter__native" type="date" data-focus-key="' + e(moduleKey + ':' + column.key + ':exact') + '" data-date-exact="' + e(moduleKey) + '" data-column-key="' + e(column.key) + '" value="' + e(dateFilter.exact || '') + '">' +
            '</div>' +
            '<div class="date-filter__range"' + (dateFilter.mode === 'range' ? '' : ' style="display:none"') + '>' +
              '<div class="date-filter__picker">' +
                '<input class="date-filter__native" type="date" data-focus-key="' + e(moduleKey + ':' + column.key + ':from') + '" data-date-from="' + e(moduleKey) + '" data-column-key="' + e(column.key) + '" value="' + e(dateFilter.from || '') + '">' +
              '</div>' +
              '<div class="date-filter__picker">' +
                '<input class="date-filter__native" type="date" data-focus-key="' + e(moduleKey + ':' + column.key + ':to') + '" data-date-to="' + e(moduleKey) + '" data-column-key="' + e(column.key) + '" value="' + e(dateFilter.to || '') + '">' +
              '</div>' +
            '</div>' +
            '</div>' +
          '</div>' +
        '</th>';
      }
      var value = gridState.filters[column.key] || '';
      return '<th class="module-table__filter-cell"><input class="module-table__filter-input" data-filter-input="' + e(moduleKey) + '" data-column-key="' + e(column.key) + '" data-focus-key="' + e(moduleKey + ':' + column.key) + '" value="' + e(value) + '" placeholder="بحث"></th>';
    }

    function renderGridPagination(moduleKey, totalRows, pageSize, page) {
      if (totalRows <= pageSize && !state.gridBusy[moduleKey]) return '';
      var hasPrev = page > 1;
      var hasNext = page * pageSize < totalRows;
      return '<footer class="module-pagination">' +
        (state.gridBusy[moduleKey] ? '<span class="module-pagination__status">جاري تحديث البيانات...</span>' : '') +
        (hasPrev ? renderIconButton({ icon: 'back', iconOnly: true, compact: true, tone: 'steel', title: 'الصفحة السابقة', attrs: { 'data-grid-page': moduleKey, 'data-page-direction': 'prev', 'data-pagination-icon': 'prev' } }) : '') +
        '<span class="module-pagination__status">صفحة ' + e(page) + ' من ' + e(Math.ceil(totalRows / pageSize)) + '</span>' +
        (hasNext ? renderIconButton({ icon: 'next', iconOnly: true, compact: true, tone: 'navy', title: 'الصفحة التالية', attrs: { 'data-grid-page': moduleKey, 'data-page-direction': 'next', 'data-pagination-icon': 'next' } }) : '') +
      '</footer>';
    }

    function renderGridShell(moduleKey, dataset, topActionsHtml) {
      var gridState = getGridState(moduleKey, dataset);
      var filteredRows = applyGridFiltering(dataset, gridState);
      var sortedRows = applyGridSorting(filteredRows, dataset, gridState);
      var totalRows = dataset.serverPaged ? Number(dataset.totalRows || sortedRows.length) || 0 : sortedRows.length;
      var totalPages = Math.max(1, Math.ceil(totalRows / dataset.pageSize));
      if (gridState.page > totalPages) gridState.page = totalPages;
      var pagedRows = dataset.serverPaged ? sortedRows : paginateRows(sortedRows, dataset.pageSize, gridState.page);
      var sharedActionsHtml = renderIconButton({ icon: 'cancel', tone: 'steel', compact: true, label: 'إعادة ضبط الفلاتر', title: 'إعادة ضبط الفلاتر', attrs: { 'data-reset-filters': moduleKey } }) + (topActionsHtml || '');

      return '' +
        '<div class="module-table-shell"><table class="module-table"><thead><tr>' +
          dataset.columns.map(function (column) {
            return '<th' + (column.sortable ? ' class="module-table__sortable" data-sort-column="' + e(moduleKey) + '" data-column-key="' + e(column.key) + '"' : '') + '>' + e(column.label) + (gridState.sortKey === column.key ? '<span class="sort-indicator">' + (gridState.sortDir === 'desc' ? '↓' : '↑') + '</span>' : '') + '</th>';
          }).join('') +
        '</tr><tr>' +
          dataset.columns.map(function (column) { return renderGridFilterCell(moduleKey, column, gridState, sharedActionsHtml); }).join('') +
        '</tr></thead><tbody>' +
          (pagedRows.length ? pagedRows.map(function (row) {
            return '<tr>' + dataset.columns.map(function (column) { return renderGridCell(row, column, moduleKey, dataset); }).join('') + '</tr>';
          }).join('') : '<tr><td class="module-table__empty" colspan="' + e(dataset.columns.length) + '">لا توجد نتائج مطابقة.</td></tr>') +
        '</tbody></table></div>' +
        renderGridPagination(moduleKey, totalRows, dataset.pageSize, gridState.page);
    }

    async function openRecordViewForModule(moduleKey, row, dataset) {
      if (moduleKey === 'auditLogs') {
        state.modalForm = {
          moduleKey: moduleKey,
          mode: 'view',
          schema: {
            titleNew: 'تفاصيل سجل التدقيق',
            titleEdit: 'تفاصيل سجل التدقيق',
            leftInfoTitle: 'معلومات السجل',
            mainTitle: 'تفاصيل سجل التدقيق',
            dynamicTitle: '',
            attachmentTitle: false,
            summaryFields: ['التاريخ والوقت', 'المنفذ', 'الوحدة', 'الوحدة الفرعية', 'الإجراء', 'النتيجة'],
            summaryFieldKeys: ['dateTime', 'actor', 'module', 'submodule', 'action', 'result'],
            mainFields: [],
            dynamicFields: []
          },
          existingAttachments: [],
          pendingAttachments: [],
          summary: row && row.formValues ? [
            formatDateTimeValue(row.formValues.dateTime || ''),
            row.formValues.actor || '—',
            row.formValues.module || '—',
            row.formValues.submodule || '—',
            row.formValues.action || '—',
            row.formValues.result || '—'
          ] : null,
          values: Object.assign({}, (row && row.formValues) || {}),
          recordId: row.id,
          detailHtml: ''
        };
        render();
        var auditDetails = await withLoading('جارٍ تحميل تفاصيل السجل...', function () {
          return callServer('nijjaraGetModuleRecord', state.session.token, moduleKey, row.id);
        });
        state.modalForm = {
          moduleKey: moduleKey,
          mode: 'view',
          schema: state.modalForm.schema,
          existingAttachments: [],
          pendingAttachments: [],
          summary: [
            formatDateTimeValue(auditDetails.formValues.dateTime || ''),
            auditDetails.formValues.actor || '—',
            auditDetails.formValues.module || '—',
            auditDetails.formValues.submodule || '—',
            auditDetails.formValues.action || '—',
            auditDetails.formValues.result || '—'
          ],
          values: auditDetails.formValues || {},
          recordId: auditDetails.id,
          detailHtml: renderAuditLogDetail(auditDetails.formValues || {})
        };
        render();
        return;
      }
      var schema = formSchemaFor(moduleKey);
      if (moduleKey === 'users' && row && row.formValues) {
        seedRecordViewModal(moduleKey, row, dataset);
        ensureLookupsLoaded(['manageableRoles', 'accessModules', 'accessScopes']).then(function () {
          render();
        }).catch(function (error) {
          toast('error', error.message);
        });
        return;
      }
      if (!state.bootstrap.formSchemas[moduleKey]) {
        var readOnlyColumns = (dataset.columns || []).filter(function (column) {
          return column.type !== 'actions' && column.type !== 'view-action' && column.type !== 'workflow-actions';
        });
        schema = {
          titleNew: 'تفاصيل السجل',
          titleEdit: 'تفاصيل السجل',
          leftInfoTitle: 'معلومات السجل',
          mainTitle: 'تفاصيل السجل',
          dynamicTitle: '',
          attachmentTitle: 'المرفقات',
          summaryFields: readOnlyColumns.map(function (column) { return column.label; }),
          summaryFieldKeys: readOnlyColumns.map(function (column) { return column.key; }),
          mainFields: [],
          dynamicFields: []
        };
        state.modalForm = {
          moduleKey: moduleKey,
          mode: 'view',
          schema: schema,
          existingAttachments: [],
          pendingAttachments: [],
          summary: deriveSummaryValues(row.values || {}, { moduleKey: moduleKey, schema: schema, attachments: [] }),
          values: Object.assign({}, row.values || {}),
          recordId: row.id
        };
        render();
        return;
      }
      seedRecordViewModal(moduleKey, row, dataset);
      var recordDetails = await withLoading('جارٍ تحميل تفاصيل السجل...', function () {
        return callServer('nijjaraGetModuleRecord', state.session.token, moduleKey, row.id);
      });
      state.modalForm = {
        moduleKey: moduleKey,
        mode: 'view',
        schema: schema,
        existingAttachments: recordDetails.attachments || [],
        pendingAttachments: [],
        summary: deriveSummaryValues(recordDetails.formValues, { moduleKey: moduleKey, schema: schema, attachments: (recordDetails.attachments || []).map(function (item) { return item.name; }) }),
        values: recordDetails.formValues,
        recordId: recordDetails.id
      };
      render();
    }

    function renderApp() {

      root.innerHTML = '' +
