<style>
  :root {
    color-scheme: dark;
    --surface: #131314;
    --surface-low: #1c1b1c;
    --surface-panel: #201f20;
    --surface-high: #2a2a2b;
    --foreground: #e5e2e3;
    --foreground-soft: #c4c6cc;
    --primary: #e9c176;
    --outline: rgba(154, 143, 128, 0.18);
    --success: #2cb67d;
    --warning: #d8a837;
    --danger: #d05d62;
    --info: #4a90d9;
    --header-height: 3.28rem;
    --taskbar-height: 4.4rem;
    --drawer-width: 19rem;
    --grid-header-height: 2.8rem;
    --grid-filter-height: 3.4rem;
    --shadow-deep: 0 34px 90px rgba(0, 0, 0, 0.45);
    --shadow-soft: 0 16px 42px rgba(0, 0, 0, 0.28);
  }

  * { box-sizing: border-box; }
  html, body { min-height: 100%; }

  body {
    margin: 0;
    background:
      radial-gradient(circle at top right, rgba(233, 193, 118, 0.1), transparent 32%),
      radial-gradient(circle at bottom left, rgba(196, 198, 204, 0.05), transparent 28%),
      linear-gradient(180deg, rgba(19, 19, 20, 0.98), rgba(14, 14, 15, 0.98)),
      var(--surface);
    color: var(--foreground);
    font-family: "Cairo", sans-serif;
    overflow: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 82% 16%, rgba(233, 193, 118, 0.08), transparent 24%),
      radial-gradient(circle at 10% 88%, rgba(196, 198, 204, 0.04), transparent 28%);
    z-index: -2;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
    background-size: 120px 120px;
    mask-image: radial-gradient(circle at center, black, transparent 85%);
    z-index: -1;
    opacity: 0.18;
  }

  button, input, select, textarea { font: inherit; }
  button { cursor: pointer; }
  .hidden { display: none !important; }

  .glass-panel,
  .dashboard-card,
  .dashboard-panel,
  .workspace-window,
  .workspace-drawer,
  .modal-form,
  .notification-panel,
  .login-card {
    position: relative;
    overflow: hidden;
    border-radius: 1.35rem;
    border: 1px solid var(--outline);
    background:
      linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0)),
      linear-gradient(180deg, rgba(42,42,43,.96), rgba(20,19,20,.98));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.08),
      inset 0 -18px 30px rgba(0,0,0,.14),
      var(--shadow-soft);
    backdrop-filter: blur(28px);
  }

  .glass-panel::before,
  .dashboard-card::before,
  .dashboard-panel::before,
  .workspace-window::before,
  .workspace-drawer::before,
  .modal-form::before,
  .notification-panel::before,
  .login-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.14), transparent 36%, transparent 72%, rgba(255,255,255,.05));
    pointer-events: none;
  }

  .login-shell {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 1.5rem;
  }

  .login-card {
    width: min(28rem, 100%);
    padding: 2rem;
    box-shadow: var(--shadow-deep);
  }

  .login-card__brand {
    text-align: center;
    margin-bottom: 2rem;
  }

  .login-card__brand h1 {
    margin: 0;
    color: var(--primary);
    font-size: 2.3rem;
    font-weight: 900;
    letter-spacing: .22em;
  }

  .login-card__brand p {
    margin: .35rem 0 0;
    color: rgba(196, 198, 204, 0.7);
    font-size: .83rem;
  }

  .auth-tabs,
  .auth-actions,
  .confirm-card__actions,
  .modal-form__actions,
  .workspace-topbar__left,
  .workspace-topbar__right,
  .workspace-taskbar__controls,
  .workspace-taskbar__windows,
  .module-toolbar__actions {
    display: flex;
    align-items: center;
    gap: .75rem;
  }

  .auth-tab,
  .workspace-taskbar__window,
  .workspace-pill,
  .workspace-icon-button,
  .workspace-drawer__group-button,
  .workspace-drawer__item,
  .action-button {
    border: 1px solid rgba(154, 143, 128, 0.16);
    background: rgba(14, 14, 15, 0.72);
    color: var(--foreground);
  }

  .auth-tab,
  .workspace-taskbar__window,
  .workspace-pill,
  .workspace-drawer__group-button,
  .workspace-drawer__item {
    min-height: 2.8rem;
    padding: 0 1rem;
    border-radius: 999px;
    font-weight: 800;
  }

  .workspace-pill--identity {
    display: inline-flex;
    align-items: center;
    gap: .55rem;
    max-width: 18rem;
    padding-inline: .85rem 1rem;
  }

  .workspace-pill__icon {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.55rem;
    height: 1.55rem;
    border-radius: 999px;
    background: rgba(233, 193, 118, 0.14);
    color: var(--primary);
    font-size: .9rem;
    line-height: 1;
  }

  .workspace-pill__label {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .auth-tab { flex: 1; }
  .auth-tab--active {
    color: var(--primary);
    border-color: rgba(233, 193, 118, 0.26);
    box-shadow: inset 0 0 0 1px rgba(233, 193, 118, 0.1);
  }

  .auth-form,
  .field,
  .workspace-dashboard,
  .modal-form__main,
  .modal-form__info-grid,
  .smart-search-results,
  .dashboard-bars {
    display: grid;
    gap: .85rem;
  }

  .field label {
    color: rgba(196, 198, 204, 0.76);
    font-size: .86rem;
    font-weight: 700;
  }

  .field input,
  .field select,
  .field textarea {
    width: 100%;
    min-height: 2.2rem;
    border-radius: .82rem;
    border: 1px solid rgba(154,143,128,.16);
    background: rgba(14,14,15,.68);
    color: var(--foreground);
    padding: .45rem .72rem;
    outline: none;
  }

  .field textarea { min-height: 4rem; resize: vertical; }
  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    border-color: rgba(233,193,118,.36);
    box-shadow: inset 0 0 0 1px rgba(233,193,118,.08);
  }

  .action-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 2.45rem;
    min-width: 6.2rem;
    padding: 0 .88rem;
    border-radius: .92rem;
    font-weight: 800;
    font-size: .9rem;
    line-height: 1;
    white-space: nowrap;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.12),
      inset 0 -10px 22px rgba(0,0,0,.16),
      0 16px 34px rgba(0,0,0,.22);
  }

  .action-button__icon {
    width: 1rem;
    height: 1rem;
    flex: 0 0 auto;
    display: block;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .action-button__label {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
  }

  .action-button--compact {
    min-width: 0;
    min-height: 2rem;
    padding: 0 .72rem;
    border-radius: .82rem;
    font-size: .84rem;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.1),
      inset 0 -8px 18px rgba(0,0,0,.18),
      0 12px 24px rgba(0,0,0,.2);
  }

  .action-button--icon-only {
    min-width: 2rem;
    width: 2rem;
    padding: 0;
  }

  .action-button--primary {
    color: #d8fff0;
    border-color: rgba(52,171,123,.34);
    background:
      linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,0)),
      linear-gradient(180deg, #18553d, #0c241b);
  }

  .action-button--danger {
    color: #fff3f3;
    border-color: rgba(180,87,92,.34);
    background:
      linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,0)),
      linear-gradient(180deg, #5a2428, #251012);
  }

  .action-button--navy {
    color: #eef4ff;
    border-color: rgba(74,144,217,.34);
    background:
      linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,0)),
      linear-gradient(180deg, #203f68, #0e1e33);
  }

  .action-button--steel,
  .action-button--view {
    color: #edf2f6;
    border-color: rgba(148,166,191,.26);
    background:
      linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,0)),
      linear-gradient(180deg, #33414d, #171f26);
  }

  .action-button--edit {
    color: #e7fff6;
    border-color: rgba(61,176,142,.28);
    background:
      linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,0)),
      linear-gradient(180deg, #214f43, #102720);
  }

  .action-button--delete {
    color: #fff3f3;
    border-color: rgba(176,84,94,.28);
    background:
      linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,0)),
      linear-gradient(180deg, #4b2328, #1f1013);
  }

  .action-button:hover {
    transform: translateY(-1px);
    filter: brightness(1.04);
  }

  .action-button:active {
    transform: translateY(0);
  }

  .auth-feedback {
    min-height: 1.3rem;
    color: #ffcbc7;
    font-size: .84rem;
  }

  .auth-feedback--static {
    min-height: 0;
    margin-bottom: 1rem;
    padding: .9rem 1rem;
    border-radius: 1rem;
    border: 1px solid rgba(229,226,227,.08);
    background: rgba(255,255,255,.04);
    color: #f3f3f3;
    line-height: 1.8;
  }

  .app-shell {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .workspace-topbar {
    position: sticky;
    top: 0;
    z-index: 60;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: var(--header-height);
    padding: .3rem 1rem;
    background: rgba(19,19,20,.82);
    border-bottom: 1px solid rgba(229,226,227,.08);
    backdrop-filter: blur(24px);
  }

  .workspace-topbar__title {
    margin: 0;
    color: var(--primary);
    font-size: 1.28rem;
    font-weight: 900;
    letter-spacing: .2em;
  }

  .workspace-icon-button {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 2.08rem;
    height: 2.08rem;
    border-radius: .95rem;
  }

  .workspace-logout-button {
    min-width: 7.4rem;
    min-height: 2.12rem;
    padding-inline: 1rem;
    border-radius: 1rem;
    font-weight: 800;
    letter-spacing: .01em;
    white-space: nowrap;
  }

  .workspace-icon-button__badge {
    position: absolute;
    top: -.2rem;
    left: -.15rem;
    min-width: 1rem;
    height: 1rem;
    padding: 0 .28rem;
    border-radius: 999px;
    background: var(--warning);
    color: #221500;
    font-size: .63rem;
    font-weight: 900;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .workspace-desktop {
    position: relative;
    flex: 1;
    overflow: hidden;
    padding: .9rem .95rem 1rem;
  }

  .workspace-desktop--blur .workspace-desktop__background,
  .workspace-desktop--blur .workspace-window:not(.workspace-window--modal) {
    filter: blur(10px) saturate(.92);
  }

  .workspace-desktop__background,
  .workspace-window-layer {
    position: absolute;
    inset: .65rem .75rem calc(var(--taskbar-height) + .95rem) .75rem;
  }

  .workspace-dashboard__stats {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 1rem;
    margin-top: .2rem;
  }

  .workspace-dashboard__analytics {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 1rem;
  }

  .dashboard-card,
  .dashboard-panel {
    padding: .9rem 1rem;
  }

  .dashboard-card__label,
  .dashboard-panel__title {
    margin: 0;
    font-weight: 800;
  }

  .dashboard-card__value {
    margin: .55rem 0 .2rem;
    font-size: 1.8rem;
    font-weight: 900;
  }

  .dashboard-card__detail {
    margin: 0;
    color: rgba(196,198,204,.72);
    font-size: .82rem;
  }

  .dashboard-card--emerald {
    background:
      linear-gradient(180deg, rgba(29, 74, 55, 0.95), rgba(16, 23, 20, 0.9)),
      rgba(15, 18, 17, 0.92);
  }

  .dashboard-card--blue {
    background:
      linear-gradient(180deg, rgba(28, 56, 86, 0.95), rgba(15, 22, 31, 0.9)),
      rgba(15, 17, 20, 0.92);
  }

  .dashboard-card--violet {
    background:
      linear-gradient(180deg, rgba(62, 42, 96, 0.95), rgba(21, 18, 32, 0.9)),
      rgba(18, 16, 22, 0.92);
  }

  .dashboard-card--amber {
    background:
      linear-gradient(180deg, rgba(92, 63, 26, 0.95), rgba(31, 23, 13, 0.9)),
      rgba(22, 18, 15, 0.92);
  }

  .dashboard-card--rose {
    background:
      linear-gradient(180deg, rgba(91, 42, 54, 0.95), rgba(28, 17, 21, 0.9)),
      rgba(22, 16, 18, 0.92);
  }

  .dashboard-columns {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: .8rem;
    height: 100%;
    min-height: 11.5rem;
    padding-bottom: .7rem;
  }

  .dashboard-columns__item {
    flex: 1;
    display: grid;
    gap: .55rem;
    justify-items: center;
    align-content: end;
    min-height: 100%;
  }

  .dashboard-columns__track {
    width: 100%;
    max-width: 3.2rem;
    height: 8.8rem;
    display: flex;
    align-items: end;
    border-radius: 1rem;
    background: rgba(255,255,255,.05);
    padding: .3rem;
  }

  .dashboard-columns__bar {
    width: 100%;
    border-radius: .8rem;
    background: linear-gradient(180deg, rgba(74,144,217,.95), rgba(18,58,102,.95));
  }

  .dashboard-columns__label {
    display: block;
    color: rgba(229,226,227,.84);
    font-size: .78rem;
    font-weight: 800;
    line-height: 1.2;
    padding: .15rem 0 .05rem;
    min-height: 1.9rem;
    text-align: center;
  }

  .dashboard-bar__meta {
    display: flex;
    justify-content: space-between;
    margin-bottom: .35rem;
    font-size: .82rem;
  }

  .dashboard-bar__track {
    height: .9rem;
    border-radius: 999px;
    background: rgba(255,255,255,.06);
    overflow: hidden;
  }

  .dashboard-bar__fill {
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #5bc5a2, #2b8e69);
  }

  .workspace-menu-handle {
    position: absolute;
    top: 50%;
    right: .35rem;
    transform: translateY(-50%);
    width: 1.1rem;
    height: 4.1rem;
    border-radius: 999px;
    z-index: 55;
    border: 1px solid rgba(233,193,118,.16);
    background:
      linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,0)),
      linear-gradient(180deg, rgba(28,28,29,.96), rgba(12,12,13,.98));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 14px 28px rgba(0,0,0,.26);
    transition: right 280ms ease, transform 280ms ease;
  }

  .workspace-menu-handle::before {
    content: '';
    position: absolute;
    inset: .7rem .35rem;
    border-radius: 999px;
    background:
      radial-gradient(circle at 50% 18%, rgba(233,193,118,.85), transparent 44%),
      repeating-linear-gradient(180deg, rgba(233,193,118,.8) 0 .16rem, transparent .16rem .45rem);
    opacity: .7;
  }

  .workspace-menu-handle--open {
    right: calc(min(var(--drawer-width), calc(100vw - 1.5rem)) + 1rem);
  }

  .workspace-drawer-backdrop {
    position: absolute;
    inset: 0 0 var(--taskbar-height) 0;
    z-index: 49;
    background: linear-gradient(180deg, rgba(9,9,10,.2), rgba(5,5,6,.42));
    backdrop-filter: blur(18px) saturate(.88);
    animation: fadeInSoft 220ms ease;
  }

  .workspace-drawer {
    position: absolute;
    top: 0;
    right: .75rem;
    bottom: calc(var(--taskbar-height) + 1rem);
    width: min(var(--drawer-width), calc(100vw - 1.5rem));
    z-index: 50;
    padding: .9rem;
    display: grid;
    gap: .65rem;
    align-content: start;
    overflow: auto;
    border-radius: 1.5rem;
    border: 1px solid rgba(185,165,129,.18);
    background:
      linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,0)),
      linear-gradient(180deg, rgba(32,32,33,.92), rgba(16,16,16,.96));
    box-shadow: 0 26px 56px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.07);
    animation: slideInDrawer 280ms ease;
  }

  .workspace-drawer__group,
  .workspace-drawer__group-items {
    display: grid;
    gap: .45rem;
  }

  .workspace-drawer__group-button {
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 3rem;
    padding: 0 1.1rem;
    font-size: .98rem;
    font-weight: 900;
    border-radius: 1.05rem;
    border-color: rgba(233,193,118,.34);
    background:
      linear-gradient(135deg, rgba(233,193,118,.16), rgba(255,255,255,0) 48%),
      linear-gradient(180deg, rgba(76,55,23,.96), rgba(31,22,11,.98));
    color: #fff0cf;
  }

  .workspace-drawer__group-button--active {
    border-color: rgba(255,221,162,.52);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 12px 22px rgba(0,0,0,.18), 0 0 0 1px rgba(233,193,118,.18);
  }

  .workspace-drawer__group-items {
    padding: .15rem .25rem .2rem;
  }

  .workspace-drawer__item {
    min-height: 2.7rem;
    padding: 0 .95rem;
    font-size: .92rem;
    color: rgba(232,232,233,.84);
    border-radius: .86rem;
    border-color: rgba(140,150,170,.18);
    background:
      linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,0)),
      linear-gradient(180deg, rgba(24,28,34,.94), rgba(12,14,17,.98));
  }

  .workspace-drawer__nested {
    display: grid;
    gap: .35rem;
    padding: .35rem 0 .35rem .75rem;
  }

  .workspace-drawer__nested-title {
    padding: 0 .45rem;
    font-size: .84rem;
    font-weight: 800;
    color: rgba(233,193,118,.88);
  }

  .workspace-drawer__item--depth-2 {
    margin-right: .45rem;
  }

  .workspace-drawer__item--depth-3 {
    margin-right: .95rem;
  }

  .workspace-window {
    position: absolute;
    display: flex;
    flex-direction: column;
    min-width: 24rem;
    min-height: 18rem;
    overflow: hidden;
  }

  .workspace-window__chrome {
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 2.45rem;
    padding: .34rem .6rem;
    border-bottom: 1px solid rgba(229,226,227,.08);
    background:
      linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0)),
      linear-gradient(180deg, rgba(30,29,30,.86), rgba(20,20,21,.92));
    cursor: move;
  }

  .workspace-window__traffic {
    display: flex;
    gap: .35rem;
    position: relative;
    z-index: 4;
  }

  .traffic-button {
    width: 1.5rem;
    height: 1.5rem;
    border-radius: .7rem;
    border: 1px solid rgba(255,255,255,.18);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,.94);
    font-size: .7rem;
    font-weight: 900;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 4px 12px rgba(0,0,0,.26);
    transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
    pointer-events: auto;
  }

  .traffic-button:hover {
    transform: translateY(-1px);
    filter: brightness(1.06);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.22), 0 10px 20px rgba(0,0,0,.28);
  }

  .traffic-button__icon {
    width: .72rem;
    height: .72rem;
    display: block;
    stroke: rgba(15, 15, 16, 0.9);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
  }

  .traffic-button--close { background: linear-gradient(180deg, #ff7a73, #b83739); }
  .traffic-button--min { background: linear-gradient(180deg, #ffd364, #c68f16); }
  .traffic-button--max { background: linear-gradient(180deg, #49df7c, #1e9449); }

  .workspace-window__title {
    margin: 0;
    font-size: .9rem;
    font-weight: 900;
    pointer-events: none;
  }

  .workspace-window__content {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: rgba(18,18,18,.92);
    overflow: hidden;
  }

  .workspace-window__resize {
    position: absolute;
    left: .2rem;
    bottom: .2rem;
    width: 1.1rem;
    height: 1.1rem;
    border: 0;
    background: transparent;
    cursor: nwse-resize;
  }

  .workspace-window__resize::before {
    content: '';
